coverage:
  status:
    project:
      default:
        # TODO(https://github.com/googleapis/librarian/issues/4508): fix
        # coverage back to 80%
        target: 70% # The target coverage percentage for the project
        threshold: 0% # Allow 0% drop from the target; any drop below target will fail
        if_ci_failed: error # Set the CI status to 'error' if coverage conditions are not met
      sidekick:
        target: 80%
        threshold: 0%
        if_ci_failed: error
        paths:
          - internal/sidekick/**
      surfer:
        target: 80%
        threshold: 0%
        if_ci_failed: error
        paths:
          - internal/surfer/**
    patch: off
ignore:
  # test packages do not need code coverage
  - internal/sample
  - internal/testhelper
  # Running tests for this would require installing the Rust toolchain.
  - internal/sidekick/rust_prost
  # legacylibrarian packages with low coverage.
  - internal/legacylibrarian/legacycontainer
  - internal/legacylibrarian/legacycontainer/java/pom
  - internal/legacylibrarian/legacycontainer/java/release
  - internal/legacylibrarian/legacyimages
