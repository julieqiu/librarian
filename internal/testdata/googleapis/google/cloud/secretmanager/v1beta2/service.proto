syntax = "proto3";

package google.cloud.secretmanager.v1beta2;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/secretmanager/v1beta2/resources.proto";
import "google/iam/v1/iam_policy.proto";
import "google/iam/v1/policy.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";

option csharp_namespace = "Google.Cloud.SecretManager.V1Beta2";
option go_package = "cloud.google.com/go/secretmanager/apiv1beta2/secretmanagerpb;secretmanagerpb";
option java_multiple_files = true;
option java_outer_classname = "ServiceProto";
option java_package = "com.google.cloud.secretmanager.v1beta2";
option objc_class_prefix = "GSM";
option php_namespace = "Google\\Cloud\\SecretManager\\V1beta2";
option ruby_package = "Google::Cloud::SecretManager::V1beta2";

// Secret Manager Service
//
// Manages secrets and operations using those secrets. Implements a REST
// model with the following objects:
//
// * [Secret][google.cloud.secretmanager.v1beta2.Secret]
// * [SecretVersion][google.cloud.secretmanager.v1beta2.SecretVersion]
service SecretManagerService {
  option (google.api.default_host) = "secretmanager.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/cloud-platform";
  // Gets metadata for a given
  // [Secret][google.cloud.secretmanager.v1beta2.Secret].
  rpc GetSecret(GetSecretRequest) returns (Secret) {
    option (google.api.http) = {
      get: "/v1beta2/{name=projects/*/secrets/*}"
      additional_bindings {
        get: "/v1beta2/{name=projects/*/locations/*/secrets/*}"
      }
    };
    option (google.api.method_signature) = "name";
  }
}

// Request message for
// [SecretManagerService.GetSecret][google.cloud.secretmanager.v1beta2.SecretManagerService.GetSecret].
message GetSecretRequest {
  // Required. The resource name of the
  // [Secret][google.cloud.secretmanager.v1beta2.Secret], in the format
  // `projects/*/secrets/*` or `projects/*/locations/*/secrets/*`.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "secretmanager.googleapis.com/Secret"
    }
  ];
}
