service_name: developerconnect.googleapis.com
regional_endpoint_compatibility: NOT_SUPPORTED
apis:
  - name: DeveloperConnect
    api_version: v1
    release_tracks:
      - ALPHA
      - BETA
      - GA
    resource_generation_filters:
      # Exclude https://source.corp.google.com/piper///depot/google3/google/cloud/developerconnect/v1main/developer_connect.proto;l=3799;rcl=726481228
      - selector: google.cloud.developerconnect.v1.User
    method_generation_filters:
      - selector: google.cloud.developerconnect.v1.DeveloperConnect.UpdateInsightsConfig
      - selector: google.cloud.developerconnect.v1.DeveloperConnect.CreateInsightsConfig
      - selector: google.cloud.developerconnect.v1.DeveloperConnect.DeleteSelf
    help_text:
      service_rules:
        - selector: google.cloud.developerconnect.v1.DeveloperConnect
          help_text:
            brief: Manage Developer Connect resources
            description: |-
              Manage Developer Connect resources
      message_rules:
        - selector: google.cloud.developerconnect.v1.Connection
          help_text:
            brief: Manage connection resources
            description: |- # Provide addtional surface/service level details here.
              Manage connection resources.
        - selector: google.cloud.developerconnect.v1.GitRepositoryLink
          help_text:
            brief: Manage git repository link resources
            description: |- # Provide addtional surface/service level details here.
              Manage git repository link resources.
      method_rules:
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.CreateConnection
          help_text:
            brief: Create a connection resource
            description: | # Provide Addtional Content and context for the command here.
              Create a connection resource.
            examples: # Add More realisitc examples here
              # TODO(b/321233033): Add examples of creating connections of different SCMs once implemented.
              - |-
                To create a GitHub connection named `my-connection` in `us-central1` run:

                $ {command} my-connection --github-config-app=developer-connect --github-config-authorizer-credential-oauth-token-secret-version=projects/my-project/secrets/my-oauth-token/versions/1 --github-config-app-installation-id=12345 --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.DeleteConnection
          help_text:
            brief: Delete a single connection
            description: | # Provide Addtional Content and context for the command here.
              Delete a single connection.
            examples: # Add More realisitc examples here
              - |-
                To delete a connection `my-comection` in location `us-central1` run:

                $ {command} my-connection --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.GetConnection
          help_text:
            brief: Get details of a single connection resource
            description: | # Provide Addtional Content and context for the command here.
              Get details of a single connection resource.
            examples: # Add More realisitc examples here
              - |-
                To get the details of a single conenction `my-connection` in location `us-central1` run:

                $ {command} my-connection --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.ListConnections
          help_text:
            brief: List connections
            description: | # Provide Addtional Content and context for the command here.
              List connections.
            examples: # Add More realisitc examples here
              - |-
                To list all connections in location `us-central1` run:

                $ {command} --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.UpdateConnection
          help_text:
            brief: Update the parameters of a single connection
            description: | # Provide Addtional Content and context for the command here.
              Update a connection.
            examples: # Add More realisitc examples here
              - |-
                To update the labels of a connection `my-connection` in location `us-central1` run:

                $ {command} my-connection --labels=key1=value1 --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.CreateGitRepositoryLink
          help_text:
            brief: Create a git repository link
            description: | # Provide Addtional Content and context for the command here.
              Create a git repository link.
            examples: # Add More realisitc examples here
              # TODO(b/321233033): Add examples of creating connections of different SCMs once implemented.
              - |-
                To create a git repository link 'my-git-repository-link' in a connection `my-connection` in `us-central1` run:

                $ {command} my-git-repository-link --clone-uri=https://github.com/my-org/my-repo.git --connection=my-connection --location=us-central1

                Or run:

                $ {command} projects/my-project/locations/us-central1/connections/my-connection/gitRepositoryLinks/my-git-repository-link --clone-uri=https://github.com/my-org/my-repo.git --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.DeleteGitRepositoryLink
          help_text:
            brief: Delete a single git repository link
            description: | # Provide Addtional Content and context for the command here.
              Delete a single git repository link.
            examples: # Add More realisitc examples here
              - |-
                To delete a git repository link `my-git-repository-link` in a connection `my-connection` in location `us-central1` run:

                $ {command} my-git-repository-link --connection=my-connection --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.GetGitRepositoryLink
          help_text:
            brief: Get details of a single git repository link
            description: | # Provide Addtional Content and context for the command here.
              Get details of a single git repository link.
            examples: # Add More realisitc examples here
              - |-
                To get the details of a single git repository link `my-git-repository-link` in a conenction `my-connection` in location `us-central1` run:

                $ {command} my-git-repository-link --connection=my-connection --location=us-central1-a
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.ListGitRepositoryLinks
          help_text:
            brief: List all git repository links in a connection
            description: | # Provide Addtional Content and context for the command here.
              List all git repository links in a connection.
            examples: # Add More realisitc examples here
              - |-
                To list all git repository links in a connection `my-connection` in location `us-central1` run:

                $ {command} --connection=my-connection --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.ListGitRepositoryLinks
          help_text:
            brief: List all git repository links in a connection
            description: | # Provide Addtional Content and context for the command here.
              List all git repository links in a connection.
            examples: # Add More realisitc examples here
              - |-
                To list all git repository links in a connection `my-connection` in location `us-central1` run:

                $ {command} --connection=my-connection --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.ListInsightsConfigs
          help_text:
            brief: Lists insights configs in a given project and location
            description: | # Provide Addtional Content and context for the command here.
              Lists InsightsConfigs in a given project and location.
            examples: # Add More realisitc examples here
              - |-
                To list all connections in location `us-central1` run:

                $ {command} --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.DeleteInsightsConfig
          help_text:
            brief: Delete a single insight config in a given project and location
            description: | # Provide Addtional Content and context for the command here.
              Delete a single insight config in a given project and location
            examples: # Add More realisitc examples here
              - |-
                To delete an insight config in location `us-central1` run:

                 $ {command} --location=us-central1
        - selector: google.cloud.developerconnect.v1.DeveloperConnect.GetInsightsConfig
          help_text:
            brief: Get details of a single insight config in a given project and location
            description: | # Provide Addtional Content and context for the command here.
              Get details of a single insight config in a given project and location
            examples: # Add More realisitc examples here
              - |-
                To get an insight config in location `us-central1` run:

                 $ {command} --location=us-central1
    output_formatting:
      - selector: google.cloud.developerconnect.v1.DeveloperConnect.CreateConnection
        # Print the installation instruction and link (if any) after creation.
        format: 'csv[no-heading,separator="\\n"](installationState.stage,installationState.message,installationState.actionUri)'
  - name: Operations
    api_version: v1
    release_tracks:
      - ALPHA
      - BETA
      - GA
  - name: InsightsConfigService
    api_version: v1
    release_tracks:
      - ALPHA
      - BETA
      - GA
