syntax = "proto3";

package method_custom.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option go_package = "google.golang.org/genproto/googleapis/method_custom/v1;method_custom";
option (google.api.resource_definition) = {
  type: "example.googleapis.com/ServiceAccount"
  pattern: "projects/{project}/serviceAccounts/{service_account}"
};

message Resource {
  option (google.api.resource) = {
    type: "example.googleapis.com/Resource"
    pattern: "projects/{project}/locations/{location}/resources/{resource}"
  };

  // Identifier. Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The labels on the resource, which can be used for categorization.
  // similar to Kubernetes resource labels.
  map<string, string> labels = 2;

  // Output only. The unique identifier of the resource. UID is unique in the
  // time and space for this resource within the scope of the service. It is
  // typically generated by the server on successful creation of a resource
  // and must not be changed. UID is used to uniquely identify resources
  // with resource name reuses. This should be a UUID4.
  string uid = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. An opaque value that uniquely identifies a version or
  // generation of a resource. It can be used to confirm that the client
  // and server agree on the ordering of a resource being written.
  string etag = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was created.
  google.protobuf.Timestamp create_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was last updated. Any
  // change to the resource made by users must refresh this value.
  // Changes to a resource made by the service should refresh this value.
  google.protobuf.Timestamp update_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Resource config.
message Config {
  // String field.
  string string_field = 1;
}

message ResourceRevision {
  option (google.api.resource) = {
    type: "example.googleapis.com/ResourceRevision"
    pattern: "projects/{project}/locations/{location}/resources/{resource}/revisions/{revision}"
  };

  // Identifier. The resource name of the service account.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. The ID of the project that owns the service account.
  string project_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The unique, stable numeric ID for the service account.
  string unique_id = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message Revision {
  option (google.api.resource) = {
    type: "example.googleapis.com/Revision"
    pattern: "projects/{project}/revisions/{revision}"
  };

  // Identifier. The resource name of the service account.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. The ID of the project that owns the service account.
  string project_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The unique, stable numeric ID for the service account.
  string unique_id = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// The request structure for the SearchResources method.
message SearchResourcesRequest {
  // Required. The parent of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "example.googleapis.com/Resource"
    }
  ];

  // Required. Target resource.
  string target = 2 [(google.api.field_behavior) = REQUIRED];

  // The maximum number of resources to send per page.
  int32 page_size = 3;

  // The page token: If the next_page_token from a previous response
  // is provided, this request will send the subsequent page.
  string page_token = 4;

  // Optional. The service account to use for the request.
  string service_account = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/ServiceAccount"
    }
  ];
}

// The response structure for the SearchResources method.
message SearchResourcesResponse {
  // The resulting resources.
  repeated Resource resources = 1;

  // If present, the next page token can be provided to a subsequent
  // SearchResources call to list the next page.
  // If empty, there are no more pages.
  string next_page_token = 2;
}

// The request to archive resource.
message ArchiveResourceRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];

  // String field.
  string string_field = 2;
}

// The request to get resource config.
message GetResourceConfigRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];
}

message ExportDataRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];

  // String field.
  string string_field = 2;
}

// The request to undelete resource.
message UndeleteResourceRequest {
  // Required. The name of the deleted book.
  // Format: publishers/{publisher}/books/{book}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];
}

// ExportDataResponse is the response returned from ExportData rpc
message ExportDataResponse {}

// The request structure for the GetResource method.
message GetResourceRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];
}

// The request structure for the ListResources method.
message ListResourcesRequest {
  // Required. The parent of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "example.googleapis.com/Resource"
    }
  ];

  // The maximum number of resources to send per page.
  int32 page_size = 2;

  // The page token: If the next_page_token from a previous response
  // is provided, this request will send the subsequent page.
  string page_token = 3;

  // Filter the list as specified in https://google.aip.dev/160.
  string filter = 4;

  // Order results as specified in https://google.aip.dev/132.
  string order_by = 5;

  // Optional. Whether to include deleted messages. Deleted messages include
  // deleted time and metadata about their deletion, but message content is
  // unavailable.
  bool show_deleted = 6 [(google.api.field_behavior) = OPTIONAL];
}

// The response structure for the ListResources method.
message ListResourcesResponse {
  // The resulting resources.
  repeated Resource resources = 1;

  // If present, the next page token can be provided to a subsequent
  // ListResources call to list the next page.
  // If empty, there are no more pages.
  string next_page_token = 2;

  // Locations that could not be reached.
  repeated string unreachable = 3;
}

// The request structure for the GetResourceConfig method.
message GetResourceRevisionRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/ResourceRevision"
    }
  ];
}

// The request structure for the SearchResourceConfigs method.
message SearchResourceRevisionsRequest {
  // Required. The parent of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "example.googleapis.com/ResourceRevision"
    }
  ];
}

// The request structure for the GetConfig method.
message GetRevisionRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Revision"
    }
  ];
}

// The request structure for the ArchiveConfig method.
message ArchiveRevisionRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Revision"
    }
  ];
}

service MethodCustom {
  option (google.api.default_host) = "methodcustom.googleapis.com";

  // Retrieve a collection of resources.
  rpc SearchResources(SearchResourcesRequest)
      returns (SearchResourcesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/resources:search"
    };
    option (google.api.method_signature) = "parent,target";
  }

  // Archives the given resource.
  rpc ArchiveResource(ArchiveResourceRequest) returns (Resource) {
    option (google.api.http) = {
      post: "/v1/{name=projects/*/locations/*/resources/*}:archive"
      body: "*"
    };
  }

  // Gets resource config.
  rpc GetResourceConfig(GetResourceConfigRequest) returns (Config) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*}/resources:getConfig"
    };
    option (google.api.method_signature) = "name";
  }

  // Exports data from the resource.
  rpc ExportData(ExportDataRequest) returns (ExportDataResponse) {
    option (google.api.http) = {
      post: "/v1/{name=projects/*/locations/*/resources/*}:export"
      body: "*"
    };
  }

  // Undeletes the given resource.
  rpc UndeleteResource(UndeleteResourceRequest) returns (Resource) {
    option (google.api.http) = {
      post: "/v1/{name=projects/*/locations/*/resources/*}:undelete"
      body: "*"
    };
  }

  // Retrieve a single resource.
  rpc GetResource(GetResourceRequest) returns (Resource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Retrieve a collection of resources.
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/resources"
    };
    option (google.api.method_signature) = "parent";
  }

  // Retrieve a single resource revision.
  rpc GetResourceRevision(GetResourceRevisionRequest)
      returns (ResourceRevision) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*/revisions/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Search resource revisions.
  rpc SearchResourceRevisions(SearchResourceRevisionsRequest)
      returns (ResourceRevision) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*/resources/*}/revisions:search"
    };
    option (google.api.method_signature) = "parent";
  }

  // Get revision.
  rpc GetRevision(GetRevisionRequest) returns (Revision) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/revisions/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Archive revision.
  rpc ArchiveRevision(ArchiveRevisionRequest) returns (Revision) {
    option (google.api.http) = {
      post: "/v1/{name=projects/*/revisions/*}:archive"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }
}
