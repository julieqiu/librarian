syntax = "proto3";

package hidden_feature.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option go_package = "google.golang.org/genproto/googleapis/hidden_feature/v1;hidden_feature";

// Message.
message MessageField {
  // String field.
  string string_field = 1;
}

message VisibleResource {
  option (google.api.resource) = {
    type: "example.googleapis.com/VisibleResource"
    pattern: "projects/{project}/locations/{location}/visibleResources/{visible_resource}"
  };

  // Identifier. Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The labels on the resource, which can be used for categorization.
  // similar to Kubernetes resource labels.
  map<string, string> labels = 2;

  // Output only. The unique identifier of the resource. UID is unique in the
  // time and space for this resource within the scope of the service. It is
  // typically generated by the server on successful creation of a resource
  // and must not be changed. UID is used to uniquely identify resources
  // with resource name reuses. This should be a UUID4.
  string uid = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. An opaque value that uniquely identifies a version or
  // generation of a resource. It can be used to confirm that the client
  // and server agree on the ordering of a resource being written.
  string etag = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was created.
  google.protobuf.Timestamp create_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was last updated. Any
  // change to the resource made by users must refresh this value.
  // Changes to a resource made by the service should refresh this value.
  google.protobuf.Timestamp update_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Hidden field.
  string hidden_field = 7;

  // Hidden message field.
  MessageField hidden_message_field = 8;
}

message HiddenResource {
  option (google.api.resource) = {
    type: "example.googleapis.com/HiddenResource"
    pattern: "projects/{project}/locations/{location}/hiddenResources/{hidden_resource}"
  };

  // Identifier. Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The labels on the resource, which can be used for categorization.
  // similar to Kubernetes resource labels.
  map<string, string> labels = 2;

  // Output only. The unique identifier of the resource. UID is unique in the
  // time and space for this resource within the scope of the service. It is
  // typically generated by the server on successful creation of a resource
  // and must not be changed. UID is used to uniquely identify resources
  // with resource name reuses. This should be a UUID4.
  string uid = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. An opaque value that uniquely identifies a version or
  // generation of a resource. It can be used to confirm that the client
  // and server agree on the ordering of a resource being written.
  string etag = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was created.
  google.protobuf.Timestamp create_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was last updated. Any
  // change to the resource made by users must refresh this value.
  // Changes to a resource made by the service should refresh this value.
  google.protobuf.Timestamp update_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

message GetVisibleResourceRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/VisibleResource"
    }
  ];
}

message CreateVisibleResourceRequest {
  // Required. The parent of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "example.googleapis.com/VisibleResource"
    }
  ];

  // Required. The ID value for the new resource.
  string visible_resource_id = 2 [(google.api.field_behavior) = REQUIRED];

  // Required. The resource to create.
  VisibleResource visible_resource = 3 [(google.api.field_behavior) = REQUIRED];

  // If "validate_only" is set to true, the service will try to validate
  // that this request would succeed, but will not actually make changes.
  bool validate_only = 4;

  // An optional request ID to identify requests. Specify a unique request ID
  // so that if you must retry your request, the server will know to ignore
  // the request if it has already
  string request_id = 5;
}

message GetHiddenResourceRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/HiddenResource"
    }
  ];
}

service HiddenFeature {
  option (google.api.default_host) = "hiddenfeature.googleapis.com";

  // Visible method.
  rpc GetVisibleResource(GetVisibleResourceRequest) returns (VisibleResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/visibleResources/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Create visible resource.
  rpc CreateVisibleResource(CreateVisibleResourceRequest)
      returns (VisibleResource) {
    option (google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/visibleResources"
      body: "visible_resource"
    };
    option (google.api.method_signature) =
        "parent,visible_resource,visible_resource_id";
  }

  // Hidden resource.
  rpc GetHiddenResource(GetHiddenResourceRequest) returns (HiddenResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/hiddenResources/*}"
    };
    option (google.api.method_signature) = "name";
  }
}
