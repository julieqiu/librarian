config_version: v2.0
service_name: resourcereference.googleapis.com
apis:
  - name: ResourceReference
    api_version: v1
    release_tracks:
      - GA
resource_patterns:
  - type: example.googleapis.com/AnotherReference
    patterns:
      - projects/{project}/locations/{location}/anothers/{another}
    api_version: v1
  - type: example.googleapis.com/AnotherMultiReference
    patterns:
      - projects/{project}/locations/{location}/anotherMultiReferences/{anotherMultiReference}
      - organizations/{organization}/locations/{location}/anotherMultiReferences/{anotherMultiReference}
    api_version: v1
