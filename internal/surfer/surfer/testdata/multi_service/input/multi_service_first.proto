syntax = "proto3";

package multi_service.v1;

import "cloud/sdk/tools/gen_sfc/test_apis/multi_service/multi_service_resources.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option go_package = "google.golang.org/genproto/googleapis/multi_service/v1;multi_service";

service FirstService {
  option (google.api.default_host) = "multiservice.googleapis.com";

  // Create shared resource.
  rpc CreateResource(CreateResourceRequest)
      returns (multi_service.v1.Resource) {
    option (google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/resources"
      body: "resource"
    };
  }

  // Get first resource.
  rpc GetFirstResource(GetFirstResourceRequest)
      returns (multi_service.v1.FirstResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/firsts/*/resources/*}"
    };
  }

  // List first rsources.
  rpc ListFirstResources(ListFirstResourcesRequest)
      returns (ListFirstResourcesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*/firsts/*}/resources"
    };
  }
}

message CreateResourceRequest {
  // Required. Location of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "multiservice.googleapis.com/Resource"
    }
  ];

  // Required. The ID value for the new resource.
  string resource_id = 2 [(google.api.field_behavior) = REQUIRED];

  // Resource to create.
  multi_service.v1.Resource resource = 3;
}

message GetFirstResourceRequest {
  // Required. The name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "multiservice.googleapis.com/FirstResource"
    }
  ];
}

// The request structure for the ListResources method.
message ListFirstResourcesRequest {
  // Required. The parent of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "multiservice.googleapis.com/FirstResource"
    }
  ];

  // The maximum number of resources to send per page.
  int32 page_size = 2;

  // The page token: If the next_page_token from a previous response
  // is provided, this request will send the subsequent page.
  string page_token = 3;

  // Filter the list as specified in https://google.aip.dev/160.
  string filter = 4;

  // Order results as specified in https://google.aip.dev/132.
  string order_by = 5;
}

// The response structure for the ListResources method.
message ListFirstResourcesResponse {
  // The resulting resources.
  repeated multi_service.v1.FirstResource first_resources = 1;

  // If present, the next page token can be provided to a subsequent
  // ListResources call to list the next page.
  // If empty, there are no more pages.
  string next_page_token = 2;

  // Locations that could not be reached.
  repeated string unreachable = 3;
}
