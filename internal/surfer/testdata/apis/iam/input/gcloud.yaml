        - selector: google.iam.v3alpha.PolicyBinding
          help_text:
            brief: Manage PolicyBinding instances.
            description: |- # Provide additional Content and context for the command here.
              Manage PolicyBinding instances.
    output_formatting:
      - selector: google.iam.v3alpha.PolicyBindings.ListPolicyBindings
        format: |-
          table(name,
                uid,
                etag,
                displayName,
                annotations,
                target.principalSet:label=principalSet,
                policyKind,
                policy,
                policy_uid,
                condition,
                createTime,
                updateTime)
