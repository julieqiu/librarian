service ResourceStandard {
  option (google.api.default_host) = "resourcestandard.googleapis.com";

  // Retrieve a collection of resources.
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/resources"
    };
    option (google.api.method_signature) = "parent";
  }

  // Retrieve a single resource.
  rpc GetResource(GetResourceRequest) returns (Resource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Lists Zones in a given project and location.
  rpc ListZones(ListZonesRequest) returns (ListZonesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*}/zones"
    };
    option (google.api.method_signature) = "parent";
  }

  // Gets details of a single Zone.
  rpc GetZone(GetZoneRequest) returns (Zone) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/zones/*}"
    };
    option (google.api.method_signature) = "name";
    option (google.api.method_signature) = "name";
  }

  // Retrieve a single zone resource.
  rpc GetZoneResource(GetZoneResourceRequest) returns (ZoneResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/zones/*/zoneResources/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Retrieve a single region resource.
  rpc GetRegionResource(GetRegionResourceRequest) returns (RegionResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/regions/*/regionResources/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Retrieve a single resource.
  rpc GetSingletonResource(GetSingletonResourceRequest)
      returns (SingletonResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/singletonResources}"
    };
    option (google.api.method_signature) = "name";
  }

  // Retrieve a single resource.
  rpc GetGlobalResource(GetGlobalResourceRequest) returns (GlobalResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/parents/*/global/globalResources/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Create a new resource.
  rpc CreateResource(CreateResourceRequest) returns (Resource) {
    option (google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/resources"
      body: "resource"
    };
    option (google.api.method_signature) = "parent,resource,resource_id";
  }

  // Update a single resource.
  rpc UpdateResource(UpdateResourceRequest) returns (Resource) {
    option (google.api.http) = {
      patch: "/v1/{resource.name=projects/*/locations/*/resources/*}"
      body: "resource"
    };
    option (google.api.method_signature) = "resource,update_mask";
  }

  // Delete a single resource.
  rpc DeleteResource(DeleteResourceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (google.api.method_signature) = "name";
  }
}
