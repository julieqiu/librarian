      child_type: "example.googleapis.com/Resource"
    }
  ];

  // Required. The ID value for the new resource.
  string resource_id = 2 [(google.api.field_behavior) = REQUIRED];

  // Required. The desired state for the resource.
  Resource resource = 3 [(google.api.field_behavior) = REQUIRED];

  // If "validate_only" is set to true, the service will try to validate
  // that this request would succeed, but will not actually make changes.
  bool validate_only = 4;

  // An optional request ID to identify requests. Specify a unique request ID
  // so that if you must retry your request, the server will know to ignore
  // the request if it has already been completed. The server will guarantee
  // that for at least 60 minutes since the first request.
