syntax = "proto3";

package multi_service.v1;

import "cloud/sdk/tools/gen_sfc/test_apis/multi_service/multi_service_resources.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option go_package = "google.golang.org/genproto/googleapis/multi_service/v1;multi_service";

service SecondService {
  option (google.api.default_host) = "multiservice.googleapis.com";

  // Get shared resource.
  rpc GetResource(GetResourceRequest) returns (multi_service.v1.Resource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*}"
    };
  }

  // Get resource two.
  rpc GetSecondResource(GetSecondResourceRequest)
      returns (multi_service.v1.SecondResource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/seconds/*/resources/*}"
    };
  }
}

message GetResourceRequest {
  // Required. The name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "multiservice.googleapis.com/Resource"
    }
  ];
}

message GetSecondResourceRequest {
  // Required. The name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "multiservice.googleapis.com/SecondResource"
    }
  ];
}
