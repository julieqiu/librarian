syntax = "proto3";

package filtered_command.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "google.golang.org/genproto/googleapis/filtered_command/v1;filtered_command";

message FilteredResource {
  option (google.api.resource) = {
    type: "example.googleapis.com/FilteredResource"
    pattern: "projects/{project}/locations/{location}/filteredResources/{filteredResource}"
  };

  // Identifier. Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The labels on the resource, which can be used for categorization.
  // similar to Kubernetes resource labels.
  map<string, string> labels = 2;

  // Output only. The unique identifier of the resource. UID is unique in the
  // time and space for this resource within the scope of the service. It is
  // typically generated by the server on successful creation of a resource
  // and must not be changed. UID is used to uniquely identify resources
  // with resource name reuses. This should be a UUID4.
  string uid = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. An opaque value that uniquely identifies a version or
  // generation of a resource. It can be used to confirm that the client
  // and server agree on the ordering of a resource being written.
  string etag = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was created.
  google.protobuf.Timestamp create_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was last updated. Any
  // change to the resource made by users must refresh this value.
  // Changes to a resource made by the service should refresh this value.
  google.protobuf.Timestamp update_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// The request structure for the GetFilteredResource method.
message GetFilteredResourceRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/FilteredResource"
    }
  ];
}

// Resource Message
message ResourceMessage {
  // String field.
  string string_field = 1;
}

message Resource {
  option (google.api.resource) = {
    type: "example.googleapis.com/Resource"
    pattern: "projects/{project}/locations/{location}/resources/{resource}"
  };

  // Identifier. Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // String field.
  string string_field = 2;

  // Filtered string field.
  string filtered_string_field = 3;

  // Resource message.
  ResourceMessage resource_message = 4;

  // Filtered resource message.
  ResourceMessage filtered_resource_message = 5;

  // The labels on the resource, which can be used for categorization.
  // similar to Kubernetes resource labels.
  map<string, string> labels = 6;

  // Output only. The unique identifier of the resource. UID is unique in the
  // time and space for this resource within the scope of the service. It is
  // typically generated by the server on successful creation of a resource
  // and must not be changed. UID is used to uniquely identify resources
  // with resource name reuses. This should be a UUID4.
  string uid = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. An opaque value that uniquely identifies a version or
  // generation of a resource. It can be used to confirm that the client
  // and server agree on the ordering of a resource being written.
  string etag = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was created.
  google.protobuf.Timestamp create_time = 9
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The timestamp when the resource was last updated. Any
  // change to the resource made by users must refresh this value.
  // Changes to a resource made by the service should refresh this value.
  google.protobuf.Timestamp update_time = 10
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// The request structure for the ListResources method.
message ListResourcesRequest {
  // Required. The parent of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "example.googleapis.com/Resource"
    }
  ];

  // The maximum number of resources to send per page.
  int32 page_size = 2;

  // The page token: If the next_page_token from a previous response
  // is provided, this request will send the subsequent page.
  string page_token = 3;

  // Filter the list as specified in https://google.aip.dev/160.
  string filter = 4;

  // Order results as specified in https://google.aip.dev/132.
  string order_by = 5;
}

// The response structure for the ListResources method.
message ListResourcesResponse {
  // The resulting resources.
  repeated Resource resources = 1;

  // If present, the next page token can be provided to a subsequent
  // ListResources call to list the next page.
  // If empty, there are no more pages.
  string next_page_token = 2;

  // Locations that could not be reached.
  repeated string unreachable = 3;
}

// The request structure for the GetResource method.
message GetResourceRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];
}

// The request structure for the CreateResource method.
message CreateResourceRequest {
  // Required. The parent of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "example.googleapis.com/Resource"
    }
  ];

  // Required. The ID value for the new resource.
  string resource_id = 2 [(google.api.field_behavior) = REQUIRED];

  // Required. The desired state for the resource.
  Resource resource = 3 [(google.api.field_behavior) = REQUIRED];

  // If "validate_only" is set to true, the service will try to validate
  // that this request would succeed, but will not actually make changes.
  bool validate_only = 4;

  // An optional request ID to identify requests. Specify a unique request ID
  // so that if you must retry your request, the server will know to ignore
  // the request if it has already been completed. The server will guarantee
  // that for at least 60 minutes since the first request.
  //
  // For example, consider a situation where you make an initial request and the
  // request times out. If you make the request again with the same request
  // ID, the server can check if original operation with the same request ID
  // was received, and if so, will ignore the second request. This prevents
  // clients from accidentally creating duplicate commitments.
  //
  // The request ID must be a valid UUID with the exception that zero UUID is
  // not supported (00000000-0000-0000-0000-000000000000).
  string request_id = 5;
}

// The request structure for the UpdateResource method.
message UpdateResourceRequest {
  // Required. The desired state for the resource.
  Resource resource = 1 [(google.api.field_behavior) = REQUIRED];

  // The etag known to the client for the expected state of the resource. This
  // is used with state-changing methods to prevent accidental overwrites when
  // multiple user agents might be acting in parallel on the same resource.
  //
  // An etag wildcard provide optimistic concurrency based on the expected
  // existence of the resource. The Any wildcard (`*`) requires that the
  // resource must already exists, and the Not Any wildcard (`!*`) requires that
  // it must not.
  string etag = 2;

  // If "validate_only" is set to true, the service will try to validate
  // that this request would succeed, but will not actually make changes.
  bool validate_only = 3;

  // An optional request ID to identify requests. Specify a unique request ID
  // so that if you must retry your request, the server will know to ignore
  // the request if it has already been completed. The server will guarantee
  // that for at least 60 minutes since the first request.
  //
  // For example, consider a situation where you make an initial request and the
  // request times out. If you make the request again with the same request
  // ID, the server can check if original operation with the same request ID
  // was received, and if so, will ignore the second request. This prevents
  // clients from accidentally creating duplicate commitments.
  //
  // The request ID must be a valid UUID with the exception that zero UUID is
  // not supported (00000000-0000-0000-0000-000000000000).
  string request_id = 4;

  // Field mask is used to specify the fields to be overwritten in the
  // Resource resource by the update.
  //
  // The fields specified in the update_mask are relative to the resource, not
  // the full request. A field will be overwritten if it is in the mask.
  //
  // If the user does not provide a mask then all fields in the
  // Resource will be overwritten.
  google.protobuf.FieldMask update_mask = 5;
}

// The request structure for the DeleteResource method.
message DeleteResourceRequest {
  // Required. The resource name of the resource within a service.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];

  // The etag known to the client for the expected state of the resource. This
  // is used with state-changing methods to prevent accidental overwrites when
  // multiple user agents might be acting in parallel on the same resource.
  //
  // An etag wildcard provide optimistic concurrency based on the expected
  // existence of the resource. The Any wildcard (`*`) requires that the
  // resource must already exists, and the Not Any wildcard (`!*`) requires that
  // it must not.
  string etag = 2;

  // If "validate_only" is set to true, the service will try to validate
