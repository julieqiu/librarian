name: api-servicecontrol-v2
version: 1.1.0
generate:
    specification_format: protobuf
    apis:
        - path: google/api/servicecontrol/v2
          service_config: google/api/servicecontrol/v2/servicecontrol.yaml
rust:
    codec:
        copyright_year: "2025"
    documentation_overrides:
        - id: .google.api.servicecontrol.v2.ResourceInfo.container
          match: |4
                - `folders/<folder-number>`
                - `organizations/<organization-number>`
          replace: |+
            - `folders/<folder-number>`
            - `organizations/<organization-number>`

