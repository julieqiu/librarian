name: recaptchaenterprise
version: 2.20.5
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/recaptchaenterprise/v1
          service_config: recaptchaenterprise_v1.yaml
          grpc_service_config: recaptchaenterprise_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc
          importpath: cloud.google.com/go/recaptchaenterprise/v2/apiv1;recaptchaenterprise
          release_level: ga
        - path: google/cloud/recaptchaenterprise/v1beta1
          service_config: recaptchaenterprise_v1beta1.yaml
          grpc_service_config: recaptchaenterprise_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/recaptchaenterprise/v2/apiv1beta1;recaptchaenterprise
          release_level: beta
go:
    source_roots:
        - recaptchaenterprise
        - internal/generated/snippets/recaptchaenterprise
    remove_regex:
        - ^internal/generated/snippets/recaptchaenterprise/
        - ^recaptchaenterprise/apiv1/[^/]*_client\.go$
        - ^recaptchaenterprise/apiv1/[^/]*_client_example_go123_test\.go$
        - ^recaptchaenterprise/apiv1/[^/]*_client_example_test\.go$
        - ^recaptchaenterprise/apiv1/auxiliary\.go$
        - ^recaptchaenterprise/apiv1/auxiliary_go123\.go$
        - ^recaptchaenterprise/apiv1/doc\.go$
        - ^recaptchaenterprise/apiv1/gapic_metadata\.json$
        - ^recaptchaenterprise/apiv1/helpers\.go$
        - ^recaptchaenterprise/apiv1/recaptchaenterprisepb/.*$
        - ^recaptchaenterprise/apiv1/\.repo-metadata\.json$
        - ^recaptchaenterprise/apiv1beta1/[^/]*_client\.go$
        - ^recaptchaenterprise/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^recaptchaenterprise/apiv1beta1/[^/]*_client_example_test\.go$
        - ^recaptchaenterprise/apiv1beta1/auxiliary\.go$
        - ^recaptchaenterprise/apiv1beta1/auxiliary_go123\.go$
        - ^recaptchaenterprise/apiv1beta1/doc\.go$
        - ^recaptchaenterprise/apiv1beta1/gapic_metadata\.json$
        - ^recaptchaenterprise/apiv1beta1/helpers\.go$
        - ^recaptchaenterprise/apiv1beta1/recaptchaenterprisepb/.*$
        - ^recaptchaenterprise/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/recaptchaenterprise/
    tag_format: '{id}/v{version}'
    module_path_version: v2
