name: recommender
version: 1.13.6
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/recommender/v1
          service_config: recommender_v1.yaml
          grpc_service_config: recommender_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/recommender/apiv1;recommender
          release_level: ga
        - path: google/cloud/recommender/v1beta1
          service_config: recommender_v1beta1.yaml
          grpc_service_config: recommender_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/recommender/apiv1beta1;recommender
          release_level: beta
go:
    source_roots:
        - recommender
        - internal/generated/snippets/recommender
    remove_regex:
        - ^internal/generated/snippets/recommender/
        - ^recommender/apiv1/[^/]*_client\.go$
        - ^recommender/apiv1/[^/]*_client_example_go123_test\.go$
        - ^recommender/apiv1/[^/]*_client_example_test\.go$
        - ^recommender/apiv1/auxiliary\.go$
        - ^recommender/apiv1/auxiliary_go123\.go$
        - ^recommender/apiv1/doc\.go$
        - ^recommender/apiv1/gapic_metadata\.json$
        - ^recommender/apiv1/helpers\.go$
        - ^recommender/apiv1/recommenderpb/.*$
        - ^recommender/apiv1/\.repo-metadata\.json$
        - ^recommender/apiv1beta1/[^/]*_client\.go$
        - ^recommender/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^recommender/apiv1beta1/[^/]*_client_example_test\.go$
        - ^recommender/apiv1beta1/auxiliary\.go$
        - ^recommender/apiv1beta1/auxiliary_go123\.go$
        - ^recommender/apiv1beta1/doc\.go$
        - ^recommender/apiv1beta1/gapic_metadata\.json$
        - ^recommender/apiv1beta1/helpers\.go$
        - ^recommender/apiv1beta1/recommenderpb/.*$
        - ^recommender/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/recommender/
    tag_format: '{id}/v{version}'
