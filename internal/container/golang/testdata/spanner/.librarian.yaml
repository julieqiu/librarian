        - internal/generated/snippets/spanner/
        - spanner/benchmarks
        - spanner/internal/benchwrapper
        - spanner/internal/testutil
        - spanner/kokoro
        - spanner/spannertest
        - spanner/test
        - spanner/testdata
    tag_format: '{id}/v{version}'
