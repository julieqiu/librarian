name: mediatranslation
version: 0.9.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/mediatranslation/v1beta1
          service_config: mediatranslation_v1beta1.yaml
          grpc_service_config: mediatranslation_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc
          importpath: cloud.google.com/go/mediatranslation/apiv1beta1;mediatranslation
          release_level: beta
go:
    source_roots:
        - mediatranslation
        - internal/generated/snippets/mediatranslation
    remove_regex:
        - ^internal/generated/snippets/mediatranslation/
        - ^mediatranslation/apiv1beta1/[^/]*_client\.go$
        - ^mediatranslation/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^mediatranslation/apiv1beta1/[^/]*_client_example_test\.go$
        - ^mediatranslation/apiv1beta1/auxiliary\.go$
        - ^mediatranslation/apiv1beta1/auxiliary_go123\.go$
        - ^mediatranslation/apiv1beta1/doc\.go$
        - ^mediatranslation/apiv1beta1/gapic_metadata\.json$
        - ^mediatranslation/apiv1beta1/helpers\.go$
        - ^mediatranslation/apiv1beta1/mediatranslationpb/.*$
        - ^mediatranslation/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/mediatranslation/
    tag_format: '{id}/v{version}'
