name: shell
version: 1.8.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/shell/v1
          service_config: cloudshell_v1.yaml
          grpc_service_config: cloudshell_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/shell/apiv1;shell
          release_level: ga
go:
    source_roots:
        - shell
        - internal/generated/snippets/shell
    remove_regex:
        - ^internal/generated/snippets/shell/
        - ^shell/apiv1/[^/]*_client\.go$
        - ^shell/apiv1/[^/]*_client_example_go123_test\.go$
        - ^shell/apiv1/[^/]*_client_example_test\.go$
        - ^shell/apiv1/auxiliary\.go$
        - ^shell/apiv1/auxiliary_go123\.go$
        - ^shell/apiv1/doc\.go$
        - ^shell/apiv1/gapic_metadata\.json$
        - ^shell/apiv1/helpers\.go$
        - ^shell/apiv1/shellpb/.*$
        - ^shell/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/shell/
    tag_format: '{id}/v{version}'
