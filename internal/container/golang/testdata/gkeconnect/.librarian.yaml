name: gkeconnect
version: 0.12.5
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/gkeconnect/gateway/v1beta1
          service_config: connectgateway_v1beta1.yaml
          grpc_service_config: connectgateway_v1beta1_grpc_service_config.json
          rest_numeric_enums: false
          transport: rest
          importpath: cloud.google.com/go/gkeconnect/gateway/apiv1beta1;gateway
          release_level: beta
        - path: google/cloud/gkeconnect/gateway/v1
          service_config: connectgateway_v1.yaml
          grpc_service_config: connectgateway_v1_grpc_service_config.json
          rest_numeric_enums: true
          transport: rest
          importpath: cloud.google.com/go/gkeconnect/gateway/apiv1;gateway
          release_level: beta
go:
    source_roots:
        - gkeconnect
        - internal/generated/snippets/gkeconnect
    remove_regex:
        - ^internal/generated/snippets/gkeconnect/
        - ^gkeconnect/gateway/apiv1/[^/]*_client\.go$
        - ^gkeconnect/gateway/apiv1/[^/]*_client_example_go123_test\.go$
        - ^gkeconnect/gateway/apiv1/[^/]*_client_example_test\.go$
        - ^gkeconnect/gateway/apiv1/auxiliary\.go$
        - ^gkeconnect/gateway/apiv1/auxiliary_go123\.go$
        - ^gkeconnect/gateway/apiv1/doc\.go$
        - ^gkeconnect/gateway/apiv1/gapic_metadata\.json$
        - ^gkeconnect/gateway/apiv1/helpers\.go$
        - ^gkeconnect/gateway/apiv1/gatewaypb/.*$
        - ^gkeconnect/gateway/apiv1/\.repo-metadata\.json$
        - ^gkeconnect/gateway/apiv1beta1/[^/]*_client\.go$
        - ^gkeconnect/gateway/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^gkeconnect/gateway/apiv1beta1/[^/]*_client_example_test\.go$
        - ^gkeconnect/gateway/apiv1beta1/auxiliary\.go$
        - ^gkeconnect/gateway/apiv1beta1/auxiliary_go123\.go$
        - ^gkeconnect/gateway/apiv1beta1/doc\.go$
        - ^gkeconnect/gateway/apiv1beta1/gapic_metadata\.json$
        - ^gkeconnect/gateway/apiv1beta1/helpers\.go$
        - ^gkeconnect/gateway/apiv1beta1/gatewaypb/.*$
        - ^gkeconnect/gateway/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/gkeconnect/
    tag_format: '{id}/v{version}'
