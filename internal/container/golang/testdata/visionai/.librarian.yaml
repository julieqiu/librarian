name: visionai
version: 0.4.6
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/visionai/v1
          service_config: visionai_v1.yaml
          grpc_service_config: visionai_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/visionai/apiv1;visionai
          release_level: ga
go:
    source_roots:
        - visionai
        - internal/generated/snippets/visionai
    remove_regex:
        - ^internal/generated/snippets/visionai/
        - ^visionai/apiv1/[^/]*_client\.go$
        - ^visionai/apiv1/[^/]*_client_example_go123_test\.go$
        - ^visionai/apiv1/[^/]*_client_example_test\.go$
        - ^visionai/apiv1/auxiliary\.go$
        - ^visionai/apiv1/auxiliary_go123\.go$
        - ^visionai/apiv1/doc\.go$
        - ^visionai/apiv1/gapic_metadata\.json$
        - ^visionai/apiv1/helpers\.go$
        - ^visionai/apiv1/visionaipb/.*$
        - ^visionai/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/visionai/
    tag_format: '{id}/v{version}'
