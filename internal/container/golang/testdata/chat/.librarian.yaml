name: chat
version: 0.15.1
generate:
    specification_format: protobuf
    apis:
        - path: google/chat/v1
          service_config: chat_v1.yaml
          grpc_service_config: chat_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/chat/apiv1;chat
          release_level: beta
go:
    source_roots:
        - chat
        - internal/generated/snippets/chat
    remove_regex:
        - ^internal/generated/snippets/chat/
        - ^chat/apiv1/[^/]*_client\.go$
        - ^chat/apiv1/[^/]*_client_example_go123_test\.go$
        - ^chat/apiv1/[^/]*_client_example_test\.go$
        - ^chat/apiv1/auxiliary\.go$
        - ^chat/apiv1/auxiliary_go123\.go$
        - ^chat/apiv1/doc\.go$
        - ^chat/apiv1/gapic_metadata\.json$
        - ^chat/apiv1/helpers\.go$
        - ^chat/apiv1/chatpb/.*$
        - ^chat/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/chat/
    tag_format: '{id}/v{version}'
