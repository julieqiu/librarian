name: memcache
version: 1.11.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/memcache/v1
          service_config: memcache_v1.yaml
          grpc_service_config: memcache_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/memcache/apiv1;memcache
          release_level: ga
        - path: google/cloud/memcache/v1beta2
          service_config: memcache_v1beta2.yaml
          grpc_service_config: memcache_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/memcache/apiv1beta2;memcache
          release_level: beta
go:
    source_roots:
        - memcache
        - internal/generated/snippets/memcache
    remove_regex:
        - ^internal/generated/snippets/memcache/
        - ^memcache/apiv1/[^/]*_client\.go$
        - ^memcache/apiv1/[^/]*_client_example_go123_test\.go$
        - ^memcache/apiv1/[^/]*_client_example_test\.go$
        - ^memcache/apiv1/auxiliary\.go$
        - ^memcache/apiv1/auxiliary_go123\.go$
        - ^memcache/apiv1/doc\.go$
        - ^memcache/apiv1/gapic_metadata\.json$
        - ^memcache/apiv1/helpers\.go$
        - ^memcache/apiv1/memcachepb/.*$
        - ^memcache/apiv1/\.repo-metadata\.json$
        - ^memcache/apiv1beta2/[^/]*_client\.go$
        - ^memcache/apiv1beta2/[^/]*_client_example_go123_test\.go$
        - ^memcache/apiv1beta2/[^/]*_client_example_test\.go$
        - ^memcache/apiv1beta2/auxiliary\.go$
        - ^memcache/apiv1beta2/auxiliary_go123\.go$
        - ^memcache/apiv1beta2/doc\.go$
        - ^memcache/apiv1beta2/gapic_metadata\.json$
        - ^memcache/apiv1beta2/helpers\.go$
        - ^memcache/apiv1beta2/memcachepb/.*$
        - ^memcache/apiv1beta2/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/memcache/
    tag_format: '{id}/v{version}'
