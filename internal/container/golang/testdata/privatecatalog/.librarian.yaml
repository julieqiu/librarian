name: privatecatalog
version: 0.10.8
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/privatecatalog/v1beta1
          service_config: cloudprivatecatalog_v1beta1.yaml
          grpc_service_config: cloudprivatecatalog_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/privatecatalog/apiv1beta1;privatecatalog
          release_level: beta
go:
    source_roots:
        - privatecatalog
        - internal/generated/snippets/privatecatalog
    remove_regex:
        - ^internal/generated/snippets/privatecatalog/
        - ^privatecatalog/apiv1beta1/[^/]*_client\.go$
        - ^privatecatalog/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^privatecatalog/apiv1beta1/[^/]*_client_example_test\.go$
        - ^privatecatalog/apiv1beta1/auxiliary\.go$
        - ^privatecatalog/apiv1beta1/auxiliary_go123\.go$
        - ^privatecatalog/apiv1beta1/doc\.go$
        - ^privatecatalog/apiv1beta1/gapic_metadata\.json$
        - ^privatecatalog/apiv1beta1/helpers\.go$
        - ^privatecatalog/apiv1beta1/privatecatalogpb/.*$
        - ^privatecatalog/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/privatecatalog/
    tag_format: '{id}/v{version}'
