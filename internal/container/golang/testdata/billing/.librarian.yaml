        - ^billing/budgets/apiv1/[^/]*_client\.go$
        - ^billing/budgets/apiv1/[^/]*_client_example_go123_test\.go$
        - ^billing/budgets/apiv1/[^/]*_client_example_test\.go$
        - ^billing/budgets/apiv1/auxiliary\.go$
        - ^billing/budgets/apiv1/auxiliary_go123\.go$
        - ^billing/budgets/apiv1/doc\.go$
        - ^billing/budgets/apiv1/gapic_metadata\.json$
        - ^billing/budgets/apiv1/helpers\.go$
        - ^billing/budgets/apiv1/budgetspb/.*$
