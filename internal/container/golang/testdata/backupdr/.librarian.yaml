name: backupdr
version: 1.4.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/backupdr/v1
          service_config: backupdr_v1.yaml
          grpc_service_config: backupdr_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/backupdr/apiv1;backupdr
          release_level: ga
go:
    source_roots:
        - backupdr
        - internal/generated/snippets/backupdr
    remove_regex:
        - ^internal/generated/snippets/backupdr/
        - ^backupdr/apiv1/[^/]*_client\.go$
        - ^backupdr/apiv1/[^/]*_client_example_go123_test\.go$
        - ^backupdr/apiv1/[^/]*_client_example_test\.go$
        - ^backupdr/apiv1/auxiliary\.go$
        - ^backupdr/apiv1/auxiliary_go123\.go$
        - ^backupdr/apiv1/doc\.go$
        - ^backupdr/apiv1/gapic_metadata\.json$
        - ^backupdr/apiv1/helpers\.go$
        - ^backupdr/apiv1/backupdrpb/.*$
        - ^backupdr/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/backupdr/
    tag_format: '{id}/v{version}'
