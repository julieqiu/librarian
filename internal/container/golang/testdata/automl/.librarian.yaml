name: automl
version: 1.15.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/automl/v1
          service_config: automl_v1.yaml
          grpc_service_config: automl_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/automl/apiv1;automl
          release_level: ga
        - path: google/cloud/automl/v1beta1
          service_config: automl_v1beta1.yaml
          grpc_service_config: automl_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/automl/apiv1beta1;automl
          release_level: beta
go:
    source_roots:
        - automl
        - internal/generated/snippets/automl
    remove_regex:
        - ^internal/generated/snippets/automl/
        - ^automl/apiv1/[^/]*_client\.go$
        - ^automl/apiv1/[^/]*_client_example_go123_test\.go$
        - ^automl/apiv1/[^/]*_client_example_test\.go$
        - ^automl/apiv1/auxiliary\.go$
        - ^automl/apiv1/auxiliary_go123\.go$
        - ^automl/apiv1/doc\.go$
        - ^automl/apiv1/gapic_metadata\.json$
        - ^automl/apiv1/helpers\.go$
        - ^automl/apiv1/automlpb/.*$
        - ^automl/apiv1/\.repo-metadata\.json$
        - ^automl/apiv1beta1/[^/]*_client\.go$
        - ^automl/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^automl/apiv1beta1/[^/]*_client_example_test\.go$
        - ^automl/apiv1beta1/auxiliary\.go$
        - ^automl/apiv1beta1/auxiliary_go123\.go$
        - ^automl/apiv1beta1/doc\.go$
        - ^automl/apiv1beta1/gapic_metadata\.json$
        - ^automl/apiv1beta1/helpers\.go$
        - ^automl/apiv1beta1/automlpb/.*$
        - ^automl/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/automl/
    tag_format: '{id}/v{version}'
