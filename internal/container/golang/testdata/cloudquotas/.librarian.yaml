name: cloudquotas
version: 1.4.0
generate:
    specification_format: protobuf
    apis:
        - path: google/api/cloudquotas/v1
          service_config: cloudquotas_v1.yaml
          grpc_service_config: cloudquotas_v1_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/cloudquotas/apiv1;cloudquotas
          release_level: ga
        - path: google/api/cloudquotas/v1beta
          service_config: cloudquotas_v1beta.yaml
          grpc_service_config: cloudquotas_v1beta_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/cloudquotas/apiv1beta;cloudquotas
          release_level: beta
go:
    source_roots:
        - cloudquotas
        - internal/generated/snippets/cloudquotas
    remove_regex:
        - ^internal/generated/snippets/cloudquotas/
        - ^cloudquotas/apiv1/[^/]*_client\.go$
        - ^cloudquotas/apiv1/[^/]*_client_example_go123_test\.go$
        - ^cloudquotas/apiv1/[^/]*_client_example_test\.go$
        - ^cloudquotas/apiv1/auxiliary\.go$
        - ^cloudquotas/apiv1/auxiliary_go123\.go$
        - ^cloudquotas/apiv1/doc\.go$
        - ^cloudquotas/apiv1/gapic_metadata\.json$
        - ^cloudquotas/apiv1/helpers\.go$
        - ^cloudquotas/apiv1/cloudquotaspb/.*$
        - ^cloudquotas/apiv1/\.repo-metadata\.json$
        - ^cloudquotas/apiv1beta/[^/]*_client\.go$
        - ^cloudquotas/apiv1beta/[^/]*_client_example_go123_test\.go$
        - ^cloudquotas/apiv1beta/[^/]*_client_example_test\.go$
        - ^cloudquotas/apiv1beta/auxiliary\.go$
        - ^cloudquotas/apiv1beta/auxiliary_go123\.go$
        - ^cloudquotas/apiv1beta/doc\.go$
        - ^cloudquotas/apiv1beta/gapic_metadata\.json$
        - ^cloudquotas/apiv1beta/helpers\.go$
        - ^cloudquotas/apiv1beta/cloudquotaspb/.*$
        - ^cloudquotas/apiv1beta/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/cloudquotas/
    tag_format: '{id}/v{version}'
