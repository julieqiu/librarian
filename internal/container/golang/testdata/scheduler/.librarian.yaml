name: scheduler
version: 1.11.8
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/scheduler/v1
          service_config: cloudscheduler_v1.yaml
          grpc_service_config: cloudscheduler_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/scheduler/apiv1;scheduler
          release_level: ga
        - path: google/cloud/scheduler/v1beta1
          service_config: cloudscheduler_v1beta1.yaml
          grpc_service_config: cloudscheduler_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/scheduler/apiv1beta1;scheduler
          release_level: beta
go:
    source_roots:
        - scheduler
        - internal/generated/snippets/scheduler
    remove_regex:
        - ^internal/generated/snippets/scheduler/
        - ^scheduler/apiv1/[^/]*_client\.go$
        - ^scheduler/apiv1/[^/]*_client_example_go123_test\.go$
        - ^scheduler/apiv1/[^/]*_client_example_test\.go$
        - ^scheduler/apiv1/auxiliary\.go$
        - ^scheduler/apiv1/auxiliary_go123\.go$
        - ^scheduler/apiv1/doc\.go$
        - ^scheduler/apiv1/gapic_metadata\.json$
        - ^scheduler/apiv1/helpers\.go$
        - ^scheduler/apiv1/schedulerpb/.*$
        - ^scheduler/apiv1/\.repo-metadata\.json$
        - ^scheduler/apiv1beta1/[^/]*_client\.go$
        - ^scheduler/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^scheduler/apiv1beta1/[^/]*_client_example_test\.go$
        - ^scheduler/apiv1beta1/auxiliary\.go$
        - ^scheduler/apiv1beta1/auxiliary_go123\.go$
        - ^scheduler/apiv1beta1/doc\.go$
        - ^scheduler/apiv1beta1/gapic_metadata\.json$
        - ^scheduler/apiv1beta1/helpers\.go$
        - ^scheduler/apiv1beta1/schedulerpb/.*$
        - ^scheduler/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/scheduler/
    tag_format: '{id}/v{version}'
