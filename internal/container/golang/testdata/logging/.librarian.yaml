name: logging
version: 1.13.1
generate:
    specification_format: protobuf
    apis:
        - path: google/logging/v2
          service_config: logging_v2.yaml
          grpc_service_config: logging_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/logging/apiv2;logging
          release_level: ga
go:
    source_roots:
        - logging
        - internal/generated/snippets/logging
    remove_regex:
        - ^internal/generated/snippets/logging/
        - ^logging/apiv2/[^/]*_client\.go$
        - ^logging/apiv2/[^/]*_client_example_go123_test\.go$
        - ^logging/apiv2/[^/]*_client_example_test\.go$
        - ^logging/apiv2/auxiliary\.go$
        - ^logging/apiv2/auxiliary_go123\.go$
        - ^logging/apiv2/doc\.go$
        - ^logging/apiv2/gapic_metadata\.json$
        - ^logging/apiv2/helpers\.go$
        - ^logging/apiv2/loggingpb/.*$
        - ^logging/apiv2/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/logging/
    tag_format: '{id}/v{version}'
