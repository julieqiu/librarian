name: recommendationengine
version: 0.9.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/recommendationengine/v1beta1
          service_config: recommendationengine_v1beta1.yaml
          grpc_service_config: recommendationengine_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/recommendationengine/apiv1beta1;recommendationengine
          release_level: beta
go:
    source_roots:
        - recommendationengine
        - internal/generated/snippets/recommendationengine
    remove_regex:
        - ^internal/generated/snippets/recommendationengine/
        - ^recommendationengine/apiv1beta1/[^/]*_client\.go$
        - ^recommendationengine/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^recommendationengine/apiv1beta1/[^/]*_client_example_test\.go$
        - ^recommendationengine/apiv1beta1/auxiliary\.go$
        - ^recommendationengine/apiv1beta1/auxiliary_go123\.go$
        - ^recommendationengine/apiv1beta1/doc\.go$
        - ^recommendationengine/apiv1beta1/gapic_metadata\.json$
        - ^recommendationengine/apiv1beta1/helpers\.go$
        - ^recommendationengine/apiv1beta1/recommendationenginepb/.*$
        - ^recommendationengine/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/recommendationengine/
    tag_format: '{id}/v{version}'
