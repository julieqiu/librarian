name: kms
version: 1.23.2
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/kms/v1
          service_config: cloudkms_v1.yaml
          grpc_service_config: cloudkms_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/kms/apiv1;kms
          release_level: ga
        - path: google/cloud/kms/inventory/v1
          service_config: kmsinventory_v1.yaml
          grpc_service_config: kmsinventory_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/kms/inventory/apiv1;inventory
          release_level: ga
go:
    source_roots:
        - kms
        - internal/generated/snippets/kms
    remove_regex:
        - ^internal/generated/snippets/kms/
        - ^kms/apiv1/[^/]*_client\.go$
        - ^kms/apiv1/[^/]*_client_example_go123_test\.go$
        - ^kms/apiv1/[^/]*_client_example_test\.go$
        - ^kms/apiv1/auxiliary\.go$
        - ^kms/apiv1/auxiliary_go123\.go$
        - ^kms/apiv1/doc\.go$
        - ^kms/apiv1/gapic_metadata\.json$
        - ^kms/apiv1/helpers\.go$
        - ^kms/apiv1/kmspb/.*$
        - ^kms/apiv1/\.repo-metadata\.json$
        - ^kms/inventory/apiv1/[^/]*_client\.go$
        - ^kms/inventory/apiv1/[^/]*_client_example_go123_test\.go$
        - ^kms/inventory/apiv1/[^/]*_client_example_test\.go$
        - ^kms/inventory/apiv1/auxiliary\.go$
        - ^kms/inventory/apiv1/auxiliary_go123\.go$
        - ^kms/inventory/apiv1/doc\.go$
        - ^kms/inventory/apiv1/gapic_metadata\.json$
        - ^kms/inventory/apiv1/helpers\.go$
        - ^kms/inventory/apiv1/inventorypb/.*$
        - ^kms/inventory/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/kms/
    tag_format: '{id}/v{version}'
