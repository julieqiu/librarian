name: workflows
version: 1.14.3
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/workflows/executions/v1
          service_config: workflowexecutions_v1.yaml
          grpc_service_config: executions_grpc_service_config.json
          rest_numeric_enums: false
          transport: grpc
          importpath: cloud.google.com/go/workflows/executions/apiv1;executions
          release_level: ga
        - path: google/cloud/workflows/executions/v1beta
          service_config: workflowexecutions_v1beta.yaml
          grpc_service_config: executions_grpc_service_config.json
          rest_numeric_enums: false
          transport: grpc+rest
          importpath: cloud.google.com/go/workflows/executions/apiv1beta;executions
          release_level: beta
        - path: google/cloud/workflows/v1
          service_config: workflows_v1.yaml
          grpc_service_config: workflows_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/workflows/apiv1;workflows
          release_level: ga
        - path: google/cloud/workflows/v1beta
          service_config: workflows_v1beta.yaml
          grpc_service_config: workflows_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/workflows/apiv1beta;workflows
          release_level: beta
go:
    source_roots:
        - workflows
        - internal/generated/snippets/workflows
    remove_regex:
        - ^internal/generated/snippets/workflows/
        - ^workflows/apiv1/[^/]*_client\.go$
        - ^workflows/apiv1/[^/]*_client_example_go123_test\.go$
        - ^workflows/apiv1/[^/]*_client_example_test\.go$
        - ^workflows/apiv1/auxiliary\.go$
        - ^workflows/apiv1/auxiliary_go123\.go$
        - ^workflows/apiv1/doc\.go$
        - ^workflows/apiv1/gapic_metadata\.json$
        - ^workflows/apiv1/helpers\.go$
        - ^workflows/apiv1/workflowspb/.*$
        - ^workflows/apiv1/\.repo-metadata\.json$
        - ^workflows/apiv1beta/[^/]*_client\.go$
        - ^workflows/apiv1beta/[^/]*_client_example_go123_test\.go$
        - ^workflows/apiv1beta/[^/]*_client_example_test\.go$
        - ^workflows/apiv1beta/auxiliary\.go$
        - ^workflows/apiv1beta/auxiliary_go123\.go$
        - ^workflows/apiv1beta/doc\.go$
        - ^workflows/apiv1beta/gapic_metadata\.json$
        - ^workflows/apiv1beta/helpers\.go$
        - ^workflows/apiv1beta/workflowspb/.*$
        - ^workflows/apiv1beta/\.repo-metadata\.json$
        - ^workflows/executions/apiv1/[^/]*_client\.go$
        - ^workflows/executions/apiv1/[^/]*_client_example_go123_test\.go$
        - ^workflows/executions/apiv1/[^/]*_client_example_test\.go$
        - ^workflows/executions/apiv1/auxiliary\.go$
        - ^workflows/executions/apiv1/auxiliary_go123\.go$
        - ^workflows/executions/apiv1/doc\.go$
        - ^workflows/executions/apiv1/gapic_metadata\.json$
        - ^workflows/executions/apiv1/helpers\.go$
        - ^workflows/executions/apiv1/executionspb/.*$
        - ^workflows/executions/apiv1/\.repo-metadata\.json$
        - ^workflows/executions/apiv1beta/[^/]*_client\.go$
        - ^workflows/executions/apiv1beta/[^/]*_client_example_go123_test\.go$
        - ^workflows/executions/apiv1beta/[^/]*_client_example_test\.go$
        - ^workflows/executions/apiv1beta/auxiliary\.go$
        - ^workflows/executions/apiv1beta/auxiliary_go123\.go$
        - ^workflows/executions/apiv1beta/doc\.go$
        - ^workflows/executions/apiv1beta/gapic_metadata\.json$
        - ^workflows/executions/apiv1beta/helpers\.go$
        - ^workflows/executions/apiv1beta/executionspb/.*$
        - ^workflows/executions/apiv1beta/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/workflows/
    tag_format: '{id}/v{version}'
