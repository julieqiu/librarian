name: domains
version: 0.10.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/domains/v1beta1
          service_config: domains_v1beta1.yaml
          grpc_service_config: domains_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/domains/apiv1beta1;domains
          release_level: beta
go:
    source_roots:
        - domains
        - internal/generated/snippets/domains
    remove_regex:
        - ^internal/generated/snippets/domains/
        - ^domains/apiv1beta1/[^/]*_client\.go$
        - ^domains/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^domains/apiv1beta1/[^/]*_client_example_test\.go$
        - ^domains/apiv1beta1/auxiliary\.go$
        - ^domains/apiv1beta1/auxiliary_go123\.go$
        - ^domains/apiv1beta1/doc\.go$
        - ^domains/apiv1beta1/gapic_metadata\.json$
        - ^domains/apiv1beta1/helpers\.go$
        - ^domains/apiv1beta1/domainspb/.*$
        - ^domains/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/domains/
    tag_format: '{id}/v{version}'
