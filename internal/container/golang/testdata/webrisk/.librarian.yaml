name: webrisk
version: 1.11.2
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/webrisk/v1
          service_config: webrisk_v1.yaml
          grpc_service_config: webrisk_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/webrisk/apiv1;webrisk
          release_level: ga
        - path: google/cloud/webrisk/v1beta1
          service_config: webrisk_v1beta1.yaml
          grpc_service_config: webrisk_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/webrisk/apiv1beta1;webrisk
          release_level: beta
go:
    source_roots:
        - webrisk
        - internal/generated/snippets/webrisk
    remove_regex:
        - ^internal/generated/snippets/webrisk/
        - ^webrisk/apiv1/[^/]*_client\.go$
        - ^webrisk/apiv1/[^/]*_client_example_go123_test\.go$
        - ^webrisk/apiv1/[^/]*_client_example_test\.go$
        - ^webrisk/apiv1/auxiliary\.go$
        - ^webrisk/apiv1/auxiliary_go123\.go$
        - ^webrisk/apiv1/doc\.go$
        - ^webrisk/apiv1/gapic_metadata\.json$
        - ^webrisk/apiv1/helpers\.go$
        - ^webrisk/apiv1/webriskpb/.*$
        - ^webrisk/apiv1/\.repo-metadata\.json$
        - ^webrisk/apiv1beta1/[^/]*_client\.go$
        - ^webrisk/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^webrisk/apiv1beta1/[^/]*_client_example_test\.go$
        - ^webrisk/apiv1beta1/auxiliary\.go$
        - ^webrisk/apiv1beta1/auxiliary_go123\.go$
        - ^webrisk/apiv1beta1/doc\.go$
        - ^webrisk/apiv1beta1/gapic_metadata\.json$
        - ^webrisk/apiv1beta1/helpers\.go$
        - ^webrisk/apiv1beta1/webriskpb/.*$
        - ^webrisk/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/webrisk/
    tag_format: '{id}/v{version}'
