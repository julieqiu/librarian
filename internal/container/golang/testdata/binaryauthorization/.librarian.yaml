name: binaryauthorization
version: 1.10.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/binaryauthorization/v1
          service_config: binaryauthorization_v1.yaml
          grpc_service_config: binaryauthorization_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/binaryauthorization/apiv1;binaryauthorization
          release_level: ga
        - path: google/cloud/binaryauthorization/v1beta1
          service_config: binaryauthorization_v1beta1.yaml
          grpc_service_config: binaryauthorization_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/binaryauthorization/apiv1beta1;binaryauthorization
          release_level: beta
go:
    source_roots:
        - binaryauthorization
        - internal/generated/snippets/binaryauthorization
    remove_regex:
        - ^internal/generated/snippets/binaryauthorization/
        - ^binaryauthorization/apiv1/[^/]*_client\.go$
        - ^binaryauthorization/apiv1/[^/]*_client_example_go123_test\.go$
        - ^binaryauthorization/apiv1/[^/]*_client_example_test\.go$
        - ^binaryauthorization/apiv1/auxiliary\.go$
        - ^binaryauthorization/apiv1/auxiliary_go123\.go$
        - ^binaryauthorization/apiv1/doc\.go$
        - ^binaryauthorization/apiv1/gapic_metadata\.json$
        - ^binaryauthorization/apiv1/helpers\.go$
        - ^binaryauthorization/apiv1/binaryauthorizationpb/.*$
        - ^binaryauthorization/apiv1/\.repo-metadata\.json$
        - ^binaryauthorization/apiv1beta1/[^/]*_client\.go$
        - ^binaryauthorization/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^binaryauthorization/apiv1beta1/[^/]*_client_example_test\.go$
        - ^binaryauthorization/apiv1beta1/auxiliary\.go$
        - ^binaryauthorization/apiv1beta1/auxiliary_go123\.go$
        - ^binaryauthorization/apiv1beta1/doc\.go$
        - ^binaryauthorization/apiv1beta1/gapic_metadata\.json$
        - ^binaryauthorization/apiv1beta1/helpers\.go$
        - ^binaryauthorization/apiv1beta1/binaryauthorizationpb/.*$
        - ^binaryauthorization/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/binaryauthorization/
    tag_format: '{id}/v{version}'
