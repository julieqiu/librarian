name: functions
version: 1.19.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/functions/v1
          service_config: cloudfunctions_v1.yaml
        - path: google/cloud/functions/v2
          service_config: cloudfunctions_v2.yaml
        - path: google/cloud/functions/v2beta
          service_config: cloudfunctions_v2beta.yaml
go:
    source_roots:
        - functions
        - internal/generated/snippets/functions
    remove_regex:
        - ^internal/generated/snippets/functions/
        - ^functions/apiv1/[^/]*_client\.go$
        - ^functions/apiv1/[^/]*_client_example_go123_test\.go$
        - ^functions/apiv1/[^/]*_client_example_test\.go$
        - ^functions/apiv1/auxiliary\.go$
        - ^functions/apiv1/auxiliary_go123\.go$
        - ^functions/apiv1/doc\.go$
        - ^functions/apiv1/gapic_metadata\.json$
        - ^functions/apiv1/helpers\.go$
        - ^functions/apiv1/functionspb/.*$
        - ^functions/apiv1/\.repo-metadata\.json$
        - ^functions/apiv2/[^/]*_client\.go$
        - ^functions/apiv2/[^/]*_client_example_go123_test\.go$
        - ^functions/apiv2/[^/]*_client_example_test\.go$
        - ^functions/apiv2/auxiliary\.go$
        - ^functions/apiv2/auxiliary_go123\.go$
        - ^functions/apiv2/doc\.go$
        - ^functions/apiv2/gapic_metadata\.json$
        - ^functions/apiv2/helpers\.go$
        - ^functions/apiv2/functionspb/.*$
        - ^functions/apiv2/\.repo-metadata\.json$
        - ^functions/apiv2beta/[^/]*_client\.go$
        - ^functions/apiv2beta/[^/]*_client_example_go123_test\.go$
        - ^functions/apiv2beta/[^/]*_client_example_test\.go$
        - ^functions/apiv2beta/auxiliary\.go$
        - ^functions/apiv2beta/auxiliary_go123\.go$
        - ^functions/apiv2beta/doc\.go$
        - ^functions/apiv2beta/gapic_metadata\.json$
        - ^functions/apiv2beta/helpers\.go$
        - ^functions/apiv2beta/functionspb/.*$
        - ^functions/apiv2beta/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/functions/
    tag_format: '{id}/v{version}'
