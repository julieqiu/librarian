name: apigateway
version: 1.7.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/apigateway/v1
          service_config: apigateway_v1.yaml
go:
    source_roots:
        - apigateway
        - internal/generated/snippets/apigateway
    remove_regex:
        - ^internal/generated/snippets/apigateway/
        - ^apigateway/apiv1/[^/]*_client\.go$
        - ^apigateway/apiv1/[^/]*_client_example_go123_test\.go$
        - ^apigateway/apiv1/[^/]*_client_example_test\.go$
        - ^apigateway/apiv1/auxiliary\.go$
        - ^apigateway/apiv1/auxiliary_go123\.go$
        - ^apigateway/apiv1/doc\.go$
        - ^apigateway/apiv1/gapic_metadata\.json$
        - ^apigateway/apiv1/helpers\.go$
        - ^apigateway/apiv1/apigatewaypb/.*$
        - ^apigateway/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/apigateway/
    tag_format: '{id}/v{version}'
