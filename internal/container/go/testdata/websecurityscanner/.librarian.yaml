name: websecurityscanner
version: 1.7.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/websecurityscanner/v1
          service_config: websecurityscanner_v1.yaml
          grpc_service_config: websecurityscanner_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/websecurityscanner/apiv1;websecurityscanner
          release_level: ga
go:
    source_roots:
        - websecurityscanner
        - internal/generated/snippets/websecurityscanner
    remove_regex:
        - ^internal/generated/snippets/websecurityscanner/
        - ^websecurityscanner/apiv1/[^/]*_client\.go$
        - ^websecurityscanner/apiv1/[^/]*_client_example_go123_test\.go$
        - ^websecurityscanner/apiv1/[^/]*_client_example_test\.go$
        - ^websecurityscanner/apiv1/auxiliary\.go$
        - ^websecurityscanner/apiv1/auxiliary_go123\.go$
        - ^websecurityscanner/apiv1/doc\.go$
        - ^websecurityscanner/apiv1/gapic_metadata\.json$
        - ^websecurityscanner/apiv1/helpers\.go$
        - ^websecurityscanner/apiv1/websecurityscannerpb/.*$
        - ^websecurityscanner/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/websecurityscanner/
    tag_format: '{id}/v{version}'
