name: longrunning
version: 0.7.0
generate:
    specification_format: protobuf
    apis:
        - path: google/longrunning
          service_config: longrunning.yaml
          client_directory: autogen
          grpc_service_config: longrunning_grpc_service_config.json
          rest_numeric_enums: false
          transport: grpc+rest
          importpath: cloud.google.com/go/longrunning/autogen;longrunning
          release_level: ga
go:
    source_roots:
        - longrunning
        - internal/generated/snippets/longrunning
    remove_regex:
        - ^internal/generated/snippets/longrunning/
        - ^longrunning/autogen/[^/]*_client\.go$
        - ^longrunning/autogen/[^/]*_client_example_go123_test\.go$
        - ^longrunning/autogen/[^/]*_client_example_test\.go$
        - ^longrunning/autogen/auxiliary\.go$
        - ^longrunning/autogen/auxiliary_go123\.go$
        - ^longrunning/autogen/doc\.go$
        - ^longrunning/autogen/gapic_metadata\.json$
        - ^longrunning/autogen/helpers\.go$
        - ^longrunning/autogen/longrunningpb/.*$
        - ^longrunning/autogen/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/longrunning/
    tag_format: '{id}/v{version}'
