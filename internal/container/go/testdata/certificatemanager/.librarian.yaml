name: certificatemanager
version: 1.9.6
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/certificatemanager/v1
          service_config: certificatemanager_v1.yaml
          grpc_service_config: certificatemanager_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/certificatemanager/apiv1;certificatemanager
          release_level: ga
go:
    source_roots:
        - certificatemanager
        - internal/generated/snippets/certificatemanager
    remove_regex:
        - ^internal/generated/snippets/certificatemanager/
        - ^certificatemanager/apiv1/[^/]*_client\.go$
        - ^certificatemanager/apiv1/[^/]*_client_example_go123_test\.go$
        - ^certificatemanager/apiv1/[^/]*_client_example_test\.go$
        - ^certificatemanager/apiv1/auxiliary\.go$
        - ^certificatemanager/apiv1/auxiliary_go123\.go$
        - ^certificatemanager/apiv1/doc\.go$
        - ^certificatemanager/apiv1/gapic_metadata\.json$
        - ^certificatemanager/apiv1/helpers\.go$
        - ^certificatemanager/apiv1/certificatemanagerpb/.*$
        - ^certificatemanager/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/certificatemanager/
    tag_format: '{id}/v{version}'
