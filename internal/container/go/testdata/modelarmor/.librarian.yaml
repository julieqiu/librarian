name: modelarmor
version: 0.6.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/modelarmor/v1
          service_config: modelarmor_v1.yaml
          grpc_service_config: modelarmor_v1_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/modelarmor/apiv1;modelarmor
          release_level: beta
        - path: google/cloud/modelarmor/v1beta
          service_config: modelarmor_v1beta.yaml
          grpc_service_config: modelarmor_v1beta_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/modelarmor/apiv1beta;modelarmor
          release_level: beta
go:
    source_roots:
        - modelarmor
        - internal/generated/snippets/modelarmor
    remove_regex:
        - ^internal/generated/snippets/modelarmor/
        - ^modelarmor/apiv1/[^/]*_client\.go$
        - ^modelarmor/apiv1/[^/]*_client_example_go123_test\.go$
        - ^modelarmor/apiv1/[^/]*_client_example_test\.go$
        - ^modelarmor/apiv1/auxiliary\.go$
        - ^modelarmor/apiv1/auxiliary_go123\.go$
        - ^modelarmor/apiv1/doc\.go$
        - ^modelarmor/apiv1/gapic_metadata\.json$
        - ^modelarmor/apiv1/helpers\.go$
        - ^modelarmor/apiv1/modelarmorpb/.*$
        - ^modelarmor/apiv1/\.repo-metadata\.json$
        - ^modelarmor/apiv1beta/[^/]*_client\.go$
        - ^modelarmor/apiv1beta/[^/]*_client_example_go123_test\.go$
        - ^modelarmor/apiv1beta/[^/]*_client_example_test\.go$
        - ^modelarmor/apiv1beta/auxiliary\.go$
        - ^modelarmor/apiv1beta/auxiliary_go123\.go$
        - ^modelarmor/apiv1beta/doc\.go$
        - ^modelarmor/apiv1beta/gapic_metadata\.json$
        - ^modelarmor/apiv1beta/helpers\.go$
        - ^modelarmor/apiv1beta/modelarmorpb/.*$
        - ^modelarmor/apiv1beta/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/modelarmor/
    tag_format: '{id}/v{version}'
