name: devicestreaming
version: 0.1.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/devicestreaming/v1
          service_config: devicestreaming_v1.yaml
go:
    source_roots:
        - devicestreaming
        - internal/generated/snippets/devicestreaming
    remove_regex:
        - ^internal/generated/snippets/devicestreaming/
        - ^devicestreaming/apiv1/[^/]*_client\.go$
        - ^devicestreaming/apiv1/[^/]*_client_example_go123_test\.go$
        - ^devicestreaming/apiv1/[^/]*_client_example_test\.go$
        - ^devicestreaming/apiv1/auxiliary\.go$
        - ^devicestreaming/apiv1/auxiliary_go123\.go$
        - ^devicestreaming/apiv1/doc\.go$
        - ^devicestreaming/apiv1/gapic_metadata\.json$
        - ^devicestreaming/apiv1/helpers\.go$
        - ^devicestreaming/apiv1/devicestreamingpb/.*$
        - ^devicestreaming/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/devicestreaming/
    tag_format: '{id}/v{version}'
