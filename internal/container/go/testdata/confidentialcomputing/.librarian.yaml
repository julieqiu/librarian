name: confidentialcomputing
version: 1.10.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/confidentialcomputing/v1
          service_config: confidentialcomputing_v1.yaml
          grpc_service_config: confidentialcomputing_v1_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/confidentialcomputing/apiv1;confidentialcomputing
          release_level: ga
        - path: google/cloud/confidentialcomputing/v1alpha1
          service_config: confidentialcomputing_v1alpha1.yaml
          grpc_service_config: confidentialcomputing_v1alpha1_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/confidentialcomputing/apiv1alpha1;confidentialcomputing
          release_level: beta
go:
    source_roots:
        - confidentialcomputing
        - internal/generated/snippets/confidentialcomputing
    remove_regex:
        - ^internal/generated/snippets/confidentialcomputing/
        - ^confidentialcomputing/apiv1/[^/]*_client\.go$
        - ^confidentialcomputing/apiv1/[^/]*_client_example_go123_test\.go$
        - ^confidentialcomputing/apiv1/[^/]*_client_example_test\.go$
        - ^confidentialcomputing/apiv1/auxiliary\.go$
        - ^confidentialcomputing/apiv1/auxiliary_go123\.go$
        - ^confidentialcomputing/apiv1/doc\.go$
        - ^confidentialcomputing/apiv1/gapic_metadata\.json$
        - ^confidentialcomputing/apiv1/helpers\.go$
        - ^confidentialcomputing/apiv1/confidentialcomputingpb/.*$
        - ^confidentialcomputing/apiv1/\.repo-metadata\.json$
        - ^confidentialcomputing/apiv1alpha1/[^/]*_client\.go$
        - ^confidentialcomputing/apiv1alpha1/[^/]*_client_example_go123_test\.go$
        - ^confidentialcomputing/apiv1alpha1/[^/]*_client_example_test\.go$
        - ^confidentialcomputing/apiv1alpha1/auxiliary\.go$
        - ^confidentialcomputing/apiv1alpha1/auxiliary_go123\.go$
        - ^confidentialcomputing/apiv1alpha1/doc\.go$
        - ^confidentialcomputing/apiv1alpha1/gapic_metadata\.json$
        - ^confidentialcomputing/apiv1alpha1/helpers\.go$
        - ^confidentialcomputing/apiv1alpha1/confidentialcomputingpb/.*$
        - ^confidentialcomputing/apiv1alpha1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/confidentialcomputing/
    tag_format: '{id}/v{version}'
