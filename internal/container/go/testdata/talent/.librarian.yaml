name: talent
version: 1.8.4
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/talent/v4
          service_config: jobs_v4.yaml
        - path: google/cloud/talent/v4beta1
          service_config: jobs_v4beta1.yaml
go:
    source_roots:
        - talent
        - internal/generated/snippets/talent
    remove_regex:
        - ^internal/generated/snippets/talent/
        - ^talent/apiv4/[^/]*_client\.go$
        - ^talent/apiv4/[^/]*_client_example_go123_test\.go$
        - ^talent/apiv4/[^/]*_client_example_test\.go$
        - ^talent/apiv4/auxiliary\.go$
        - ^talent/apiv4/auxiliary_go123\.go$
        - ^talent/apiv4/doc\.go$
        - ^talent/apiv4/gapic_metadata\.json$
        - ^talent/apiv4/helpers\.go$
        - ^talent/apiv4/talentpb/.*$
        - ^talent/apiv4/\.repo-metadata\.json$
        - ^talent/apiv4beta1/[^/]*_client\.go$
        - ^talent/apiv4beta1/[^/]*_client_example_go123_test\.go$
        - ^talent/apiv4beta1/[^/]*_client_example_test\.go$
        - ^talent/apiv4beta1/auxiliary\.go$
        - ^talent/apiv4beta1/auxiliary_go123\.go$
        - ^talent/apiv4beta1/doc\.go$
        - ^talent/apiv4beta1/gapic_metadata\.json$
        - ^talent/apiv4beta1/helpers\.go$
        - ^talent/apiv4beta1/talentpb/.*$
        - ^talent/apiv4beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/talent/
    tag_format: '{id}/v{version}'
