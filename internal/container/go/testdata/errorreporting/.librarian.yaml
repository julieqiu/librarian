name: errorreporting
version: 0.3.2
generate:
    specification_format: protobuf
    apis:
        - path: google/devtools/clouderrorreporting/v1beta1
          service_config: clouderrorreporting_v1beta1.yaml
          client_directory: apiv1beta1
          grpc_service_config: errorreporting_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/errorreporting/apiv1beta1;errorreporting
          release_level: beta
go:
    source_roots:
        - errorreporting
        - internal/generated/snippets/errorreporting
    remove_regex:
        - ^internal/generated/snippets/errorreporting/
        - ^errorreporting/apiv1beta1/[^/]*_client\.go$
        - ^errorreporting/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^errorreporting/apiv1beta1/[^/]*_client_example_test\.go$
        - ^errorreporting/apiv1beta1/auxiliary\.go$
        - ^errorreporting/apiv1beta1/auxiliary_go123\.go$
        - ^errorreporting/apiv1beta1/doc\.go$
        - ^errorreporting/apiv1beta1/gapic_metadata\.json$
        - ^errorreporting/apiv1beta1/helpers\.go$
        - ^errorreporting/apiv1beta1/errorreportingpb/.*$
        - ^errorreporting/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/errorreporting/
    tag_format: '{id}/v{version}'
