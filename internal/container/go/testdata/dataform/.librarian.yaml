name: dataform
version: 0.12.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/dataform/v1
          service_config: dataform_v1.yaml
        - path: google/cloud/dataform/v1beta1
          service_config: dataform_v1beta1.yaml
go:
    source_roots:
        - dataform
        - internal/generated/snippets/dataform
    remove_regex:
        - ^internal/generated/snippets/dataform/
        - ^dataform/apiv1/[^/]*_client\.go$
        - ^dataform/apiv1/[^/]*_client_example_go123_test\.go$
        - ^dataform/apiv1/[^/]*_client_example_test\.go$
        - ^dataform/apiv1/auxiliary\.go$
        - ^dataform/apiv1/auxiliary_go123\.go$
        - ^dataform/apiv1/doc\.go$
        - ^dataform/apiv1/gapic_metadata\.json$
        - ^dataform/apiv1/helpers\.go$
        - ^dataform/apiv1/dataformpb/.*$
        - ^dataform/apiv1/\.repo-metadata\.json$
        - ^dataform/apiv1beta1/[^/]*_client\.go$
        - ^dataform/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^dataform/apiv1beta1/[^/]*_client_example_test\.go$
        - ^dataform/apiv1beta1/auxiliary\.go$
        - ^dataform/apiv1beta1/auxiliary_go123\.go$
        - ^dataform/apiv1beta1/doc\.go$
        - ^dataform/apiv1beta1/gapic_metadata\.json$
        - ^dataform/apiv1beta1/helpers\.go$
        - ^dataform/apiv1beta1/dataformpb/.*$
        - ^dataform/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/dataform/
    tag_format: '{id}/v{version}'
