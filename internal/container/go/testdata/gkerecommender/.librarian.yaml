name: gkerecommender
version: 0.0.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/gkerecommender/v1
          service_config: gkerecommender_v1.yaml
go:
    source_roots:
        - gkerecommender
        - internal/generated/snippets/gkerecommender
    remove_regex:
        - ^internal/generated/snippets/gkerecommender/
        - ^gkerecommender/apiv1/[^/]*_client\.go$
        - ^gkerecommender/apiv1/[^/]*_client_example_go123_test\.go$
        - ^gkerecommender/apiv1/[^/]*_client_example_test\.go$
        - ^gkerecommender/apiv1/auxiliary\.go$
        - ^gkerecommender/apiv1/auxiliary_go123\.go$
        - ^gkerecommender/apiv1/doc\.go$
        - ^gkerecommender/apiv1/gapic_metadata\.json$
        - ^gkerecommender/apiv1/helpers\.go$
        - ^gkerecommender/apiv1/gkerecommenderpb/.*$
        - ^gkerecommender/apiv1/\.repo-metadata\.json$
    tag_format: '{id}/v{version}'
