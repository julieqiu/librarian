name: speech
version: 1.28.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/speech/v1
          service_config: speech_v1.yaml
          grpc_service_config: speech_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/speech/apiv1;speech
          release_level: ga
        - path: google/cloud/speech/v1p1beta1
          service_config: speech_v1p1beta1.yaml
          grpc_service_config: speech_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/speech/apiv1p1beta1;speech
          release_level: beta
        - path: google/cloud/speech/v2
          service_config: speech_v2.yaml
          grpc_service_config: speech_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/speech/apiv2;speech
          release_level: ga
go:
    source_roots:
        - speech
        - internal/generated/snippets/speech
    remove_regex:
        - ^internal/generated/snippets/speech/
        - ^speech/apiv1/[^/]*_client\.go$
        - ^speech/apiv1/[^/]*_client_example_go123_test\.go$
        - ^speech/apiv1/[^/]*_client_example_test\.go$
        - ^speech/apiv1/auxiliary\.go$
        - ^speech/apiv1/auxiliary_go123\.go$
        - ^speech/apiv1/doc\.go$
        - ^speech/apiv1/gapic_metadata\.json$
        - ^speech/apiv1/helpers\.go$
        - ^speech/apiv1/speechpb/.*$
        - ^speech/apiv1/\.repo-metadata\.json$
        - ^speech/apiv1p1beta1/[^/]*_client\.go$
        - ^speech/apiv1p1beta1/[^/]*_client_example_go123_test\.go$
        - ^speech/apiv1p1beta1/[^/]*_client_example_test\.go$
        - ^speech/apiv1p1beta1/auxiliary\.go$
        - ^speech/apiv1p1beta1/auxiliary_go123\.go$
        - ^speech/apiv1p1beta1/doc\.go$
        - ^speech/apiv1p1beta1/gapic_metadata\.json$
        - ^speech/apiv1p1beta1/helpers\.go$
        - ^speech/apiv1p1beta1/speechpb/.*$
        - ^speech/apiv1p1beta1/\.repo-metadata\.json$
        - ^speech/apiv2/[^/]*_client\.go$
        - ^speech/apiv2/[^/]*_client_example_go123_test\.go$
        - ^speech/apiv2/[^/]*_client_example_test\.go$
        - ^speech/apiv2/auxiliary\.go$
        - ^speech/apiv2/auxiliary_go123\.go$
        - ^speech/apiv2/doc\.go$
        - ^speech/apiv2/gapic_metadata\.json$
        - ^speech/apiv2/helpers\.go$
        - ^speech/apiv2/speechpb/.*$
        - ^speech/apiv2/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/speech/
    tag_format: '{id}/v{version}'
