name: servicedirectory
version: 1.12.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/servicedirectory/v1
          service_config: servicedirectory_v1.yaml
        - path: google/cloud/servicedirectory/v1beta1
          service_config: servicedirectory_v1beta1.yaml
go:
    source_roots:
        - servicedirectory
        - internal/generated/snippets/servicedirectory
    remove_regex:
        - ^internal/generated/snippets/servicedirectory/
        - ^servicedirectory/apiv1/[^/]*_client\.go$
        - ^servicedirectory/apiv1/[^/]*_client_example_go123_test\.go$
        - ^servicedirectory/apiv1/[^/]*_client_example_test\.go$
        - ^servicedirectory/apiv1/auxiliary\.go$
        - ^servicedirectory/apiv1/auxiliary_go123\.go$
        - ^servicedirectory/apiv1/doc\.go$
        - ^servicedirectory/apiv1/gapic_metadata\.json$
        - ^servicedirectory/apiv1/helpers\.go$
        - ^servicedirectory/apiv1/servicedirectorypb/.*$
        - ^servicedirectory/apiv1/\.repo-metadata\.json$
        - ^servicedirectory/apiv1beta1/[^/]*_client\.go$
        - ^servicedirectory/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^servicedirectory/apiv1beta1/[^/]*_client_example_test\.go$
        - ^servicedirectory/apiv1beta1/auxiliary\.go$
        - ^servicedirectory/apiv1beta1/auxiliary_go123\.go$
        - ^servicedirectory/apiv1beta1/doc\.go$
        - ^servicedirectory/apiv1beta1/gapic_metadata\.json$
        - ^servicedirectory/apiv1beta1/helpers\.go$
        - ^servicedirectory/apiv1beta1/servicedirectorypb/.*$
        - ^servicedirectory/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/servicedirectory/
    tag_format: '{id}/v{version}'
