name: securityposture
version: 0.2.6
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/securityposture/v1
          service_config: securityposture_v1.yaml
go:
    source_roots:
        - securityposture
        - internal/generated/snippets/securityposture
    remove_regex:
        - ^internal/generated/snippets/securityposture/
        - ^securityposture/apiv1/[^/]*_client\.go$
        - ^securityposture/apiv1/[^/]*_client_example_go123_test\.go$
        - ^securityposture/apiv1/[^/]*_client_example_test\.go$
        - ^securityposture/apiv1/auxiliary\.go$
        - ^securityposture/apiv1/auxiliary_go123\.go$
        - ^securityposture/apiv1/doc\.go$
        - ^securityposture/apiv1/gapic_metadata\.json$
        - ^securityposture/apiv1/helpers\.go$
        - ^securityposture/apiv1/securityposturepb/.*$
        - ^securityposture/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/securityposture/
    tag_format: '{id}/v{version}'
