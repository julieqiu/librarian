name: apphub
version: 0.4.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/apphub/v1
          service_config: apphub_v1.yaml
go:
    source_roots:
        - apphub
        - internal/generated/snippets/apphub
    remove_regex:
        - ^internal/generated/snippets/apphub/
        - ^apphub/apiv1/[^/]*_client\.go$
        - ^apphub/apiv1/[^/]*_client_example_go123_test\.go$
        - ^apphub/apiv1/[^/]*_client_example_test\.go$
        - ^apphub/apiv1/auxiliary\.go$
        - ^apphub/apiv1/auxiliary_go123\.go$
        - ^apphub/apiv1/doc\.go$
        - ^apphub/apiv1/gapic_metadata\.json$
        - ^apphub/apiv1/helpers\.go$
        - ^apphub/apiv1/apphubpb/.*$
        - ^apphub/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/apphub/
    tag_format: '{id}/v{version}'
