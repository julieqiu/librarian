name: storagebatchoperations
version: 0.1.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/storagebatchoperations/v1
          service_config: storagebatchoperations_v1.yaml
go:
    source_roots:
        - storagebatchoperations
        - internal/generated/snippets/storagebatchoperations
    remove_regex:
        - ^internal/generated/snippets/storagebatchoperations/
        - ^storagebatchoperations/apiv1/[^/]*_client\.go$
        - ^storagebatchoperations/apiv1/[^/]*_client_example_go123_test\.go$
        - ^storagebatchoperations/apiv1/[^/]*_client_example_test\.go$
        - ^storagebatchoperations/apiv1/auxiliary\.go$
        - ^storagebatchoperations/apiv1/auxiliary_go123\.go$
        - ^storagebatchoperations/apiv1/doc\.go$
        - ^storagebatchoperations/apiv1/gapic_metadata\.json$
        - ^storagebatchoperations/apiv1/helpers\.go$
        - ^storagebatchoperations/apiv1/storagebatchoperationspb/.*$
        - ^storagebatchoperations/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/storagebatchoperations/
    tag_format: '{id}/v{version}'
