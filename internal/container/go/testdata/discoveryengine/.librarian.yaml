name: discoveryengine
version: 1.22.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/discoveryengine/v1
          service_config: discoveryengine_v1.yaml
        - path: google/cloud/discoveryengine/v1beta
          service_config: discoveryengine_v1beta.yaml
        - path: google/cloud/discoveryengine/v1alpha
          service_config: discoveryengine_v1alpha.yaml
go:
    source_roots:
        - discoveryengine
        - internal/generated/snippets/discoveryengine
    remove_regex:
        - ^internal/generated/snippets/discoveryengine/
        - ^discoveryengine/apiv1/[^/]*_client\.go$
        - ^discoveryengine/apiv1/[^/]*_client_example_go123_test\.go$
        - ^discoveryengine/apiv1/[^/]*_client_example_test\.go$
        - ^discoveryengine/apiv1/auxiliary\.go$
        - ^discoveryengine/apiv1/auxiliary_go123\.go$
        - ^discoveryengine/apiv1/doc\.go$
        - ^discoveryengine/apiv1/gapic_metadata\.json$
        - ^discoveryengine/apiv1/helpers\.go$
        - ^discoveryengine/apiv1/discoveryenginepb/.*$
        - ^discoveryengine/apiv1/\.repo-metadata\.json$
        - ^discoveryengine/apiv1alpha/[^/]*_client\.go$
        - ^discoveryengine/apiv1alpha/[^/]*_client_example_go123_test\.go$
        - ^discoveryengine/apiv1alpha/[^/]*_client_example_test\.go$
        - ^discoveryengine/apiv1alpha/auxiliary\.go$
        - ^discoveryengine/apiv1alpha/auxiliary_go123\.go$
        - ^discoveryengine/apiv1alpha/doc\.go$
        - ^discoveryengine/apiv1alpha/gapic_metadata\.json$
        - ^discoveryengine/apiv1alpha/helpers\.go$
        - ^discoveryengine/apiv1alpha/discoveryenginepb/.*$
        - ^discoveryengine/apiv1alpha/\.repo-metadata\.json$
        - ^discoveryengine/apiv1beta/[^/]*_client\.go$
        - ^discoveryengine/apiv1beta/[^/]*_client_example_go123_test\.go$
        - ^discoveryengine/apiv1beta/[^/]*_client_example_test\.go$
        - ^discoveryengine/apiv1beta/auxiliary\.go$
        - ^discoveryengine/apiv1beta/auxiliary_go123\.go$
        - ^discoveryengine/apiv1beta/doc\.go$
        - ^discoveryengine/apiv1beta/gapic_metadata\.json$
        - ^discoveryengine/apiv1beta/helpers\.go$
        - ^discoveryengine/apiv1beta/discoveryenginepb/.*$
        - ^discoveryengine/apiv1beta/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/discoveryengine/
    tag_format: '{id}/v{version}'
