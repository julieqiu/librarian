name: gkehub
version: 0.16.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/gkehub/v1beta1
          service_config: gkehub_v1beta1.yaml
go:
    source_roots:
        - gkehub
        - internal/generated/snippets/gkehub
    remove_regex:
        - ^internal/generated/snippets/gkehub/
        - ^gkehub/apiv1beta1/[^/]*_client\.go$
        - ^gkehub/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^gkehub/apiv1beta1/[^/]*_client_example_test\.go$
        - ^gkehub/apiv1beta1/auxiliary\.go$
        - ^gkehub/apiv1beta1/auxiliary_go123\.go$
        - ^gkehub/apiv1beta1/doc\.go$
        - ^gkehub/apiv1beta1/gapic_metadata\.json$
        - ^gkehub/apiv1beta1/helpers\.go$
        - ^gkehub/apiv1beta1/gkehubpb/.*$
        - ^gkehub/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/gkehub/
    tag_format: '{id}/v{version}'
