name: compute
version: 1.49.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/compute/v1
          service_config: compute_v1.yaml
          grpc_service_config: compute_grpc_service_config.json
          rest_numeric_enums: false
          transport: rest
          importpath: cloud.google.com/go/compute/apiv1;compute
          release_level: ga
        - path: google/cloud/compute/v1beta
          service_config: compute_v1beta.yaml
          grpc_service_config: compute_grpc_service_config.json
          rest_numeric_enums: false
          transport: rest
          importpath: cloud.google.com/go/compute/apiv1beta;compute
          release_level: ga
go:
    source_roots:
        - compute
        - internal/generated/snippets/compute
    remove_regex:
        - ^internal/generated/snippets/compute/
        - ^compute/apiv1/[^/]*_client\.go$
        - ^compute/apiv1/[^/]*_client_example_go123_test\.go$
        - ^compute/apiv1/[^/]*_client_example_test\.go$
        - ^compute/apiv1/auxiliary\.go$
        - ^compute/apiv1/auxiliary_go123\.go$
        - ^compute/apiv1/doc\.go$
        - ^compute/apiv1/gapic_metadata\.json$
        - ^compute/apiv1/helpers\.go$
        - ^compute/apiv1/operations\.go$
        - ^compute/apiv1/computepb/.*$
        - ^compute/apiv1/\.repo-metadata\.json$
        - ^compute/apiv1beta/[^/]*_client\.go$
        - ^compute/apiv1beta/[^/]*_client_example_go123_test\.go$
        - ^compute/apiv1beta/[^/]*_client_example_test\.go$
        - ^compute/apiv1beta/auxiliary\.go$
        - ^compute/apiv1beta/auxiliary_go123\.go$
        - ^compute/apiv1beta/doc\.go$
        - ^compute/apiv1beta/gapic_metadata\.json$
        - ^compute/apiv1beta/helpers\.go$
        - ^compute/apiv1beta/operations\.go$
        - ^compute/apiv1beta/computepb/.*$
        - ^compute/apiv1beta/\.repo-metadata\.json$
    release_exclude_paths:
        - compute/metadata/
        - internal/generated/snippets/compute/
    tag_format: '{id}/v{version}'
