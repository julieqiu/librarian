name: optimization
version: 1.7.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/optimization/v1
          service_config: cloudoptimization_v1.yaml
go:
    source_roots:
        - optimization
        - internal/generated/snippets/optimization
    remove_regex:
        - ^internal/generated/snippets/optimization/
        - ^optimization/apiv1/[^/]*_client\.go$
        - ^optimization/apiv1/[^/]*_client_example_go123_test\.go$
        - ^optimization/apiv1/[^/]*_client_example_test\.go$
        - ^optimization/apiv1/auxiliary\.go$
        - ^optimization/apiv1/auxiliary_go123\.go$
        - ^optimization/apiv1/doc\.go$
        - ^optimization/apiv1/gapic_metadata\.json$
        - ^optimization/apiv1/helpers\.go$
        - ^optimization/apiv1/optimizationpb/.*$
        - ^optimization/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/optimization/
    tag_format: '{id}/v{version}'
