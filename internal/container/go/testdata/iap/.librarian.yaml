name: iap
version: 1.11.3
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/iap/v1
          service_config: iap_v1.yaml
          grpc_service_config: iap_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/iap/apiv1;iap
          release_level: ga
go:
    source_roots:
        - iap
        - internal/generated/snippets/iap
    remove_regex:
        - ^internal/generated/snippets/iap/
        - ^iap/apiv1/[^/]*_client\.go$
        - ^iap/apiv1/[^/]*_client_example_go123_test\.go$
        - ^iap/apiv1/[^/]*_client_example_test\.go$
        - ^iap/apiv1/auxiliary\.go$
        - ^iap/apiv1/auxiliary_go123\.go$
        - ^iap/apiv1/doc\.go$
        - ^iap/apiv1/gapic_metadata\.json$
        - ^iap/apiv1/helpers\.go$
        - ^iap/apiv1/iappb/.*$
        - ^iap/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/iap/
    tag_format: '{id}/v{version}'
