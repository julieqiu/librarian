name: networksecurity
version: 0.10.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/networksecurity/v1beta1
          service_config: networksecurity_v1beta1.yaml
go:
    source_roots:
        - networksecurity
        - internal/generated/snippets/networksecurity
    remove_regex:
        - ^internal/generated/snippets/networksecurity/
        - ^networksecurity/apiv1beta1/[^/]*_client\.go$
        - ^networksecurity/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^networksecurity/apiv1beta1/[^/]*_client_example_test\.go$
        - ^networksecurity/apiv1beta1/auxiliary\.go$
        - ^networksecurity/apiv1beta1/auxiliary_go123\.go$
        - ^networksecurity/apiv1beta1/doc\.go$
        - ^networksecurity/apiv1beta1/gapic_metadata\.json$
        - ^networksecurity/apiv1beta1/helpers\.go$
        - ^networksecurity/apiv1beta1/networksecuritypb/.*$
        - ^networksecurity/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/networksecurity/
    tag_format: '{id}/v{version}'
