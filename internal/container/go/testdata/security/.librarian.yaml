name: security
version: 1.19.2
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/security/privateca/v1
          service_config: privateca_v1.yaml
        - path: google/cloud/security/publicca/v1beta1
          service_config: publicca_v1beta1.yaml
        - path: google/cloud/security/publicca/v1
          service_config: publicca_v1.yaml
go:
    source_roots:
        - security
        - internal/generated/snippets/security
    remove_regex:
        - ^internal/generated/snippets/security/
        - ^security/privateca/apiv1/[^/]*_client\.go$
        - ^security/privateca/apiv1/[^/]*_client_example_go123_test\.go$
        - ^security/privateca/apiv1/[^/]*_client_example_test\.go$
        - ^security/privateca/apiv1/auxiliary\.go$
        - ^security/privateca/apiv1/auxiliary_go123\.go$
        - ^security/privateca/apiv1/doc\.go$
        - ^security/privateca/apiv1/gapic_metadata\.json$
        - ^security/privateca/apiv1/helpers\.go$
        - ^security/privateca/apiv1/privatecapb/.*$
        - ^security/privateca/apiv1/\.repo-metadata\.json$
        - ^security/publicca/apiv1/[^/]*_client\.go$
        - ^security/publicca/apiv1/[^/]*_client_example_go123_test\.go$
        - ^security/publicca/apiv1/[^/]*_client_example_test\.go$
        - ^security/publicca/apiv1/auxiliary\.go$
        - ^security/publicca/apiv1/auxiliary_go123\.go$
        - ^security/publicca/apiv1/doc\.go$
        - ^security/publicca/apiv1/gapic_metadata\.json$
        - ^security/publicca/apiv1/helpers\.go$
        - ^security/publicca/apiv1/publiccapb/.*$
        - ^security/publicca/apiv1/\.repo-metadata\.json$
        - ^security/publicca/apiv1beta1/[^/]*_client\.go$
        - ^security/publicca/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^security/publicca/apiv1beta1/[^/]*_client_example_test\.go$
        - ^security/publicca/apiv1beta1/auxiliary\.go$
        - ^security/publicca/apiv1beta1/auxiliary_go123\.go$
        - ^security/publicca/apiv1beta1/doc\.go$
        - ^security/publicca/apiv1beta1/gapic_metadata\.json$
        - ^security/publicca/apiv1beta1/helpers\.go$
        - ^security/publicca/apiv1beta1/publiccapb/.*$
        - ^security/publicca/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/security/
    tag_format: '{id}/v{version}'
