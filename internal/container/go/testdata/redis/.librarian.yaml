name: redis
version: 1.18.3
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/redis/v1
          service_config: redis_v1.yaml
        - path: google/cloud/redis/v1beta1
          service_config: redis_v1beta1.yaml
        - path: google/cloud/redis/cluster/v1
          service_config: redis_v1.yaml
go:
    source_roots:
        - redis
        - internal/generated/snippets/redis
    remove_regex:
        - ^internal/generated/snippets/redis/
        - ^redis/apiv1/[^/]*_client\.go$
        - ^redis/apiv1/[^/]*_client_example_go123_test\.go$
        - ^redis/apiv1/[^/]*_client_example_test\.go$
        - ^redis/apiv1/auxiliary\.go$
        - ^redis/apiv1/auxiliary_go123\.go$
        - ^redis/apiv1/doc\.go$
        - ^redis/apiv1/gapic_metadata\.json$
        - ^redis/apiv1/helpers\.go$
        - ^redis/apiv1/redispb/.*$
        - ^redis/apiv1/\.repo-metadata\.json$
        - ^redis/apiv1beta1/[^/]*_client\.go$
        - ^redis/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^redis/apiv1beta1/[^/]*_client_example_test\.go$
        - ^redis/apiv1beta1/auxiliary\.go$
        - ^redis/apiv1beta1/auxiliary_go123\.go$
        - ^redis/apiv1beta1/doc\.go$
        - ^redis/apiv1beta1/gapic_metadata\.json$
        - ^redis/apiv1beta1/helpers\.go$
        - ^redis/apiv1beta1/redispb/.*$
        - ^redis/apiv1beta1/\.repo-metadata\.json$
        - ^redis/cluster/apiv1/[^/]*_client\.go$
        - ^redis/cluster/apiv1/[^/]*_client_example_go123_test\.go$
        - ^redis/cluster/apiv1/[^/]*_client_example_test\.go$
        - ^redis/cluster/apiv1/auxiliary\.go$
        - ^redis/cluster/apiv1/auxiliary_go123\.go$
        - ^redis/cluster/apiv1/doc\.go$
        - ^redis/cluster/apiv1/gapic_metadata\.json$
        - ^redis/cluster/apiv1/helpers\.go$
        - ^redis/cluster/apiv1/clusterpb/.*$
        - ^redis/cluster/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/redis/
    tag_format: '{id}/v{version}'
