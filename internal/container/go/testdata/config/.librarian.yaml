name: config
version: 1.5.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/config/v1
          service_config: config_v1.yaml
go:
    source_roots:
        - config
        - internal/generated/snippets/config
    remove_regex:
        - ^internal/generated/snippets/config/
        - ^config/apiv1/[^/]*_client\.go$
        - ^config/apiv1/[^/]*_client_example_go123_test\.go$
        - ^config/apiv1/[^/]*_client_example_test\.go$
        - ^config/apiv1/auxiliary\.go$
        - ^config/apiv1/auxiliary_go123\.go$
        - ^config/apiv1/doc\.go$
        - ^config/apiv1/gapic_metadata\.json$
        - ^config/apiv1/helpers\.go$
        - ^config/apiv1/configpb/.*$
        - ^config/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/config/
    tag_format: '{id}/v{version}'
