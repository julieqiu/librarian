name: notebooks
version: 1.12.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/notebooks/v1
          service_config: notebooks_v1.yaml
        - path: google/cloud/notebooks/v1beta1
          service_config: notebooks_v1beta1.yaml
        - path: google/cloud/notebooks/v2
          service_config: notebooks_v2.yaml
go:
    source_roots:
        - notebooks
        - internal/generated/snippets/notebooks
    remove_regex:
        - ^internal/generated/snippets/notebooks/
        - ^notebooks/apiv1/[^/]*_client\.go$
        - ^notebooks/apiv1/[^/]*_client_example_go123_test\.go$
        - ^notebooks/apiv1/[^/]*_client_example_test\.go$
        - ^notebooks/apiv1/auxiliary\.go$
        - ^notebooks/apiv1/auxiliary_go123\.go$
        - ^notebooks/apiv1/doc\.go$
        - ^notebooks/apiv1/gapic_metadata\.json$
        - ^notebooks/apiv1/helpers\.go$
        - ^notebooks/apiv1/notebookspb/.*$
        - ^notebooks/apiv1/\.repo-metadata\.json$
        - ^notebooks/apiv1beta1/[^/]*_client\.go$
        - ^notebooks/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^notebooks/apiv1beta1/[^/]*_client_example_test\.go$
        - ^notebooks/apiv1beta1/auxiliary\.go$
        - ^notebooks/apiv1beta1/auxiliary_go123\.go$
        - ^notebooks/apiv1beta1/doc\.go$
        - ^notebooks/apiv1beta1/gapic_metadata\.json$
        - ^notebooks/apiv1beta1/helpers\.go$
        - ^notebooks/apiv1beta1/notebookspb/.*$
        - ^notebooks/apiv1beta1/\.repo-metadata\.json$
        - ^notebooks/apiv2/[^/]*_client\.go$
        - ^notebooks/apiv2/[^/]*_client_example_go123_test\.go$
        - ^notebooks/apiv2/[^/]*_client_example_test\.go$
        - ^notebooks/apiv2/auxiliary\.go$
        - ^notebooks/apiv2/auxiliary_go123\.go$
        - ^notebooks/apiv2/doc\.go$
        - ^notebooks/apiv2/gapic_metadata\.json$
        - ^notebooks/apiv2/helpers\.go$
        - ^notebooks/apiv2/notebookspb/.*$
        - ^notebooks/apiv2/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/notebooks/
    tag_format: '{id}/v{version}'
