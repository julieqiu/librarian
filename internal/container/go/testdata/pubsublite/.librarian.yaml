name: pubsublite
version: 1.8.2
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/pubsublite/v1
          service_config: pubsublite_v1.yaml
go:
    source_roots:
        - pubsublite
        - internal/generated/snippets/pubsublite
    remove_regex:
        - ^internal/generated/snippets/pubsublite/
        - ^pubsublite/apiv1/[^/]*_client\.go$
        - ^pubsublite/apiv1/[^/]*_client_example_go123_test\.go$
        - ^pubsublite/apiv1/[^/]*_client_example_test\.go$
        - ^pubsublite/apiv1/auxiliary\.go$
        - ^pubsublite/apiv1/auxiliary_go123\.go$
        - ^pubsublite/apiv1/doc\.go$
        - ^pubsublite/apiv1/gapic_metadata\.json$
        - ^pubsublite/apiv1/helpers\.go$
        - ^pubsublite/apiv1/pubsublitepb/.*$
        - ^pubsublite/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/pubsublite/
    tag_format: '{id}/v{version}'
