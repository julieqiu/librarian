name: videointelligence
version: 1.12.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/videointelligence/v1
          service_config: videointelligence_v1.yaml
        - path: google/cloud/videointelligence/v1beta2
          service_config: videointelligence_v1beta2.yaml
        - path: google/cloud/videointelligence/v1p3beta1
          service_config: videointelligence_v1p3beta1.yaml
go:
    source_roots:
        - videointelligence
        - internal/generated/snippets/videointelligence
    remove_regex:
        - ^internal/generated/snippets/videointelligence/
        - ^videointelligence/apiv1/[^/]*_client\.go$
        - ^videointelligence/apiv1/[^/]*_client_example_go123_test\.go$
        - ^videointelligence/apiv1/[^/]*_client_example_test\.go$
        - ^videointelligence/apiv1/auxiliary\.go$
        - ^videointelligence/apiv1/auxiliary_go123\.go$
        - ^videointelligence/apiv1/doc\.go$
        - ^videointelligence/apiv1/gapic_metadata\.json$
        - ^videointelligence/apiv1/helpers\.go$
        - ^videointelligence/apiv1/videointelligencepb/.*$
        - ^videointelligence/apiv1/\.repo-metadata\.json$
        - ^videointelligence/apiv1beta2/[^/]*_client\.go$
        - ^videointelligence/apiv1beta2/[^/]*_client_example_go123_test\.go$
        - ^videointelligence/apiv1beta2/[^/]*_client_example_test\.go$
        - ^videointelligence/apiv1beta2/auxiliary\.go$
        - ^videointelligence/apiv1beta2/auxiliary_go123\.go$
        - ^videointelligence/apiv1beta2/doc\.go$
        - ^videointelligence/apiv1beta2/gapic_metadata\.json$
        - ^videointelligence/apiv1beta2/helpers\.go$
        - ^videointelligence/apiv1beta2/videointelligencepb/.*$
        - ^videointelligence/apiv1beta2/\.repo-metadata\.json$
        - ^videointelligence/apiv1p3beta1/[^/]*_client\.go$
        - ^videointelligence/apiv1p3beta1/[^/]*_client_example_go123_test\.go$
        - ^videointelligence/apiv1p3beta1/[^/]*_client_example_test\.go$
        - ^videointelligence/apiv1p3beta1/auxiliary\.go$
        - ^videointelligence/apiv1p3beta1/auxiliary_go123\.go$
        - ^videointelligence/apiv1p3beta1/doc\.go$
        - ^videointelligence/apiv1p3beta1/gapic_metadata\.json$
        - ^videointelligence/apiv1p3beta1/helpers\.go$
        - ^videointelligence/apiv1p3beta1/videointelligencepb/.*$
        - ^videointelligence/apiv1p3beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/videointelligence/
    tag_format: '{id}/v{version}'
