name: serviceusage
version: 1.9.7
generate:
    specification_format: protobuf
    apis:
        - path: google/api/serviceusage/v1
          service_config: serviceusage_v1.yaml
go:
    source_roots:
        - serviceusage
        - internal/generated/snippets/serviceusage
    remove_regex:
        - ^internal/generated/snippets/serviceusage/
        - ^serviceusage/apiv1/[^/]*_client\.go$
        - ^serviceusage/apiv1/[^/]*_client_example_go123_test\.go$
        - ^serviceusage/apiv1/[^/]*_client_example_test\.go$
        - ^serviceusage/apiv1/auxiliary\.go$
        - ^serviceusage/apiv1/auxiliary_go123\.go$
        - ^serviceusage/apiv1/doc\.go$
        - ^serviceusage/apiv1/gapic_metadata\.json$
        - ^serviceusage/apiv1/helpers\.go$
        - ^serviceusage/apiv1/serviceusagepb/.*$
        - ^serviceusage/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/serviceusage/
    tag_format: '{id}/v{version}'
