name: datacatalog
version: 1.26.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/datacatalog/lineage/v1
          service_config: datalineage_v1.yaml
          grpc_service_config: lineage_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/datacatalog/lineage/apiv1;lineage
          release_level: ga
        - path: google/cloud/datacatalog/v1
          service_config: datacatalog_v1.yaml
          grpc_service_config: datacatalog_grpc_service_config.json
          rest_numeric_enums: false
          transport: grpc+rest
          importpath: cloud.google.com/go/datacatalog/apiv1;datacatalog
          release_level: ga
        - path: google/cloud/datacatalog/v1beta1
          service_config: datacatalog_v1beta1.yaml
          grpc_service_config: datacatalog_grpc_service_config.json
          rest_numeric_enums: false
          transport: grpc+rest
          importpath: cloud.google.com/go/datacatalog/apiv1beta1;datacatalog
          release_level: beta
go:
    source_roots:
        - datacatalog
        - internal/generated/snippets/datacatalog
    preserve_regex:
        - ^datacatalog/apiv1/iam_policy_client\.go$
    remove_regex:
        - ^internal/generated/snippets/datacatalog/
        - ^datacatalog/apiv1/[^/]*_client\.go$
        - ^datacatalog/apiv1/[^/]*_client_example_go123_test\.go$
        - ^datacatalog/apiv1/[^/]*_client_example_test\.go$
        - ^datacatalog/apiv1/auxiliary\.go$
        - ^datacatalog/apiv1/auxiliary_go123\.go$
        - ^datacatalog/apiv1/doc\.go$
        - ^datacatalog/apiv1/gapic_metadata\.json$
        - ^datacatalog/apiv1/helpers\.go$
        - ^datacatalog/apiv1/datacatalogpb/.*$
        - ^datacatalog/apiv1/\.repo-metadata\.json$
        - ^datacatalog/apiv1beta1/[^/]*_client\.go$
        - ^datacatalog/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^datacatalog/apiv1beta1/[^/]*_client_example_test\.go$
        - ^datacatalog/apiv1beta1/auxiliary\.go$
        - ^datacatalog/apiv1beta1/auxiliary_go123\.go$
        - ^datacatalog/apiv1beta1/doc\.go$
        - ^datacatalog/apiv1beta1/gapic_metadata\.json$
        - ^datacatalog/apiv1beta1/helpers\.go$
        - ^datacatalog/apiv1beta1/datacatalogpb/.*$
        - ^datacatalog/apiv1beta1/\.repo-metadata\.json$
        - ^datacatalog/lineage/apiv1/[^/]*_client\.go$
        - ^datacatalog/lineage/apiv1/[^/]*_client_example_go123_test\.go$
        - ^datacatalog/lineage/apiv1/[^/]*_client_example_test\.go$
        - ^datacatalog/lineage/apiv1/auxiliary\.go$
        - ^datacatalog/lineage/apiv1/auxiliary_go123\.go$
        - ^datacatalog/lineage/apiv1/doc\.go$
        - ^datacatalog/lineage/apiv1/gapic_metadata\.json$
        - ^datacatalog/lineage/apiv1/helpers\.go$
        - ^datacatalog/lineage/apiv1/lineagepb/.*$
        - ^datacatalog/lineage/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/datacatalog/
    tag_format: '{id}/v{version}'
