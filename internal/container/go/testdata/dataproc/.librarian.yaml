name: dataproc
version: 2.15.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/dataproc/v1
          service_config: dataproc_v1.yaml
          grpc_service_config: dataproc_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/dataproc/v2/apiv1;dataproc
          release_level: ga
go:
    source_roots:
        - dataproc
        - internal/generated/snippets/dataproc
    remove_regex:
        - ^internal/generated/snippets/dataproc/
        - ^dataproc/apiv1/[^/]*_client\.go$
        - ^dataproc/apiv1/[^/]*_client_example_go123_test\.go$
        - ^dataproc/apiv1/[^/]*_client_example_test\.go$
        - ^dataproc/apiv1/auxiliary\.go$
        - ^dataproc/apiv1/auxiliary_go123\.go$
        - ^dataproc/apiv1/doc\.go$
        - ^dataproc/apiv1/gapic_metadata\.json$
        - ^dataproc/apiv1/helpers\.go$
        - ^dataproc/apiv1/dataprocpb/.*$
        - ^dataproc/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/dataproc/
    tag_format: '{id}/v{version}'
    module_path_version: v2
