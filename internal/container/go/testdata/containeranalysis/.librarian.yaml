name: containeranalysis
version: 0.14.2
generate:
    specification_format: protobuf
    apis:
        - path: google/devtools/containeranalysis/v1beta1
          service_config: containeranalysis_v1beta1.yaml
go:
    source_roots:
        - containeranalysis
        - internal/generated/snippets/containeranalysis
    remove_regex:
        - ^internal/generated/snippets/containeranalysis/
        - ^containeranalysis/apiv1beta1/[^/]*_client\.go$
        - ^containeranalysis/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^containeranalysis/apiv1beta1/[^/]*_client_example_test\.go$
        - ^containeranalysis/apiv1beta1/auxiliary\.go$
        - ^containeranalysis/apiv1beta1/auxiliary_go123\.go$
        - ^containeranalysis/apiv1beta1/doc\.go$
        - ^containeranalysis/apiv1beta1/gapic_metadata\.json$
        - ^containeranalysis/apiv1beta1/helpers\.go$
        - ^containeranalysis/apiv1beta1/containeranalysispb/.*$
        - ^containeranalysis/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/containeranalysis/
    tag_format: '{id}/v{version}'
