name: phishingprotection
version: 0.9.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/phishingprotection/v1beta1
          service_config: phishingprotection_v1beta1.yaml
          grpc_service_config: phishingprotection_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/phishingprotection/apiv1beta1;phishingprotection
          release_level: beta
go:
    source_roots:
        - phishingprotection
        - internal/generated/snippets/phishingprotection
    remove_regex:
        - ^internal/generated/snippets/phishingprotection/
        - ^phishingprotection/apiv1beta1/[^/]*_client\.go$
        - ^phishingprotection/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^phishingprotection/apiv1beta1/[^/]*_client_example_test\.go$
        - ^phishingprotection/apiv1beta1/auxiliary\.go$
        - ^phishingprotection/apiv1beta1/auxiliary_go123\.go$
        - ^phishingprotection/apiv1beta1/doc\.go$
        - ^phishingprotection/apiv1beta1/gapic_metadata\.json$
        - ^phishingprotection/apiv1beta1/helpers\.go$
        - ^phishingprotection/apiv1beta1/phishingprotectionpb/.*$
        - ^phishingprotection/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/phishingprotection/
    tag_format: '{id}/v{version}'
