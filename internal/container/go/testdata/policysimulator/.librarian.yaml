name: policysimulator
version: 0.4.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/policysimulator/v1
          service_config: policysimulator_v1.yaml
          grpc_service_config: policysimulator_v1_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/policysimulator/apiv1;policysimulator
          release_level: ga
go:
    source_roots:
        - policysimulator
        - internal/generated/snippets/policysimulator
    remove_regex:
        - ^internal/generated/snippets/policysimulator/
        - ^policysimulator/apiv1/[^/]*_client\.go$
        - ^policysimulator/apiv1/[^/]*_client_example_go123_test\.go$
        - ^policysimulator/apiv1/[^/]*_client_example_test\.go$
        - ^policysimulator/apiv1/auxiliary\.go$
        - ^policysimulator/apiv1/auxiliary_go123\.go$
        - ^policysimulator/apiv1/doc\.go$
        - ^policysimulator/apiv1/gapic_metadata\.json$
        - ^policysimulator/apiv1/helpers\.go$
        - ^policysimulator/apiv1/policysimulatorpb/.*$
        - ^policysimulator/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/policysimulator/
    tag_format: '{id}/v{version}'
