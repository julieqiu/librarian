name: firestore
version: 1.20.0
generate:
    specification_format: protobuf
    apis:
        - path: google/firestore/admin/v1
          service_config: firestore_v1.yaml
          client_directory: apiv1/admin
          grpc_service_config: firestore_admin_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/firestore/apiv1/admin;apiv1
          release_level: ga
        - path: google/firestore/v1
          service_config: firestore_v1.yaml
          grpc_service_config: firestore_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/firestore/apiv1;firestore
          release_level: ga
go:
    source_roots:
        - firestore
        - internal/generated/snippets/firestore
    remove_regex:
        - ^internal/generated/snippets/firestore/
        - ^firestore/apiv1/[^/]*_client\.go$
        - ^firestore/apiv1/[^/]*_client_example_go123_test\.go$
        - ^firestore/apiv1/[^/]*_client_example_test\.go$
        - ^firestore/apiv1/auxiliary\.go$
        - ^firestore/apiv1/auxiliary_go123\.go$
        - ^firestore/apiv1/doc\.go$
        - ^firestore/apiv1/gapic_metadata\.json$
        - ^firestore/apiv1/helpers\.go$
        - ^firestore/apiv1/firestorepb/.*$
        - ^firestore/apiv1/\.repo-metadata\.json$
        - ^firestore/apiv1/admin/[^/]*_client\.go$
        - ^firestore/apiv1/admin/[^/]*_client_example_go123_test\.go$
        - ^firestore/apiv1/admin/[^/]*_client_example_test\.go$
        - ^firestore/apiv1/admin/auxiliary\.go$
        - ^firestore/apiv1/admin/auxiliary_go123\.go$
        - ^firestore/apiv1/admin/doc\.go$
        - ^firestore/apiv1/admin/gapic_metadata\.json$
        - ^firestore/apiv1/admin/helpers\.go$
        - ^firestore/apiv1/admin/adminpb/.*$
        - ^firestore/apiv1/admin/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/firestore/
    tag_format: '{id}/v{version}'
