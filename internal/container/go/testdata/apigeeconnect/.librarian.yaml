name: apigeeconnect
version: 1.7.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/apigeeconnect/v1
          service_config: apigeeconnect_v1.yaml
          grpc_service_config: connection_grpc_service_config.json
          rest_numeric_enums: true
          importpath: cloud.google.com/go/apigeeconnect/apiv1;apigeeconnect
          release_level: ga
go:
    source_roots:
        - apigeeconnect
        - internal/generated/snippets/apigeeconnect
    remove_regex:
        - ^internal/generated/snippets/apigeeconnect/
        - ^apigeeconnect/apiv1/[^/]*_client\.go$
        - ^apigeeconnect/apiv1/[^/]*_client_example_go123_test\.go$
        - ^apigeeconnect/apiv1/[^/]*_client_example_test\.go$
        - ^apigeeconnect/apiv1/auxiliary\.go$
        - ^apigeeconnect/apiv1/auxiliary_go123\.go$
        - ^apigeeconnect/apiv1/doc\.go$
        - ^apigeeconnect/apiv1/gapic_metadata\.json$
        - ^apigeeconnect/apiv1/helpers\.go$
        - ^apigeeconnect/apiv1/apigeeconnectpb/.*$
        - ^apigeeconnect/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/apigeeconnect/
    tag_format: '{id}/v{version}'
