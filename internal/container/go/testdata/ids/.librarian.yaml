name: ids
version: 1.5.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/ids/v1
          service_config: ids_v1.yaml
go:
    source_roots:
        - ids
        - internal/generated/snippets/ids
    remove_regex:
        - ^internal/generated/snippets/ids/
        - ^ids/apiv1/[^/]*_client\.go$
        - ^ids/apiv1/[^/]*_client_example_go123_test\.go$
        - ^ids/apiv1/[^/]*_client_example_test\.go$
        - ^ids/apiv1/auxiliary\.go$
        - ^ids/apiv1/auxiliary_go123\.go$
        - ^ids/apiv1/doc\.go$
        - ^ids/apiv1/gapic_metadata\.json$
        - ^ids/apiv1/helpers\.go$
        - ^ids/apiv1/idspb/.*$
        - ^ids/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/ids/
    tag_format: '{id}/v{version}'
