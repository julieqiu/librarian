        - internal/kokoro
        - internal/leakcheck
        - internal/librariangen
        - internal/postprocessor
        - internal/pretty
        - internal/protoveneer
        - internal/testutil
        - internal/tracecontext
        - internal/version
    tag_format: v{version}
