name: datalabeling
version: 0.9.7
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/datalabeling/v1beta1
          service_config: datalabeling_v1beta1.yaml
go:
    source_roots:
        - datalabeling
        - internal/generated/snippets/datalabeling
    remove_regex:
        - ^internal/generated/snippets/datalabeling/
        - ^datalabeling/apiv1beta1/[^/]*_client\.go$
        - ^datalabeling/apiv1beta1/[^/]*_client_example_go123_test\.go$
        - ^datalabeling/apiv1beta1/[^/]*_client_example_test\.go$
        - ^datalabeling/apiv1beta1/auxiliary\.go$
        - ^datalabeling/apiv1beta1/auxiliary_go123\.go$
        - ^datalabeling/apiv1beta1/doc\.go$
        - ^datalabeling/apiv1beta1/gapic_metadata\.json$
        - ^datalabeling/apiv1beta1/helpers\.go$
        - ^datalabeling/apiv1beta1/datalabelingpb/.*$
        - ^datalabeling/apiv1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/datalabeling/
    tag_format: '{id}/v{version}'
