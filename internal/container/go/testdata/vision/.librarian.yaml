name: vision
version: 2.9.6
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/vision/v1
          service_config: vision_v1.yaml
        - path: google/cloud/vision/v1p1beta1
          service_config: vision_v1p1beta1.yaml
go:
    source_roots:
        - vision
        - internal/generated/snippets/vision
    remove_regex:
        - ^internal/generated/snippets/vision/
        - ^vision/apiv1/[^/]*_client\.go$
        - ^vision/apiv1/[^/]*_client_example_go123_test\.go$
        - ^vision/apiv1/[^/]*_client_example_test\.go$
        - ^vision/apiv1/auxiliary\.go$
        - ^vision/apiv1/auxiliary_go123\.go$
        - ^vision/apiv1/doc\.go$
        - ^vision/apiv1/gapic_metadata\.json$
        - ^vision/apiv1/helpers\.go$
        - ^vision/apiv1/visionpb/.*$
        - ^vision/apiv1/\.repo-metadata\.json$
        - ^vision/apiv1p1beta1/[^/]*_client\.go$
        - ^vision/apiv1p1beta1/[^/]*_client_example_go123_test\.go$
        - ^vision/apiv1p1beta1/[^/]*_client_example_test\.go$
        - ^vision/apiv1p1beta1/auxiliary\.go$
        - ^vision/apiv1p1beta1/auxiliary_go123\.go$
        - ^vision/apiv1p1beta1/doc\.go$
        - ^vision/apiv1p1beta1/gapic_metadata\.json$
        - ^vision/apiv1p1beta1/helpers\.go$
        - ^vision/apiv1p1beta1/visionpb/.*$
        - ^vision/apiv1p1beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/vision/
    tag_format: '{id}/v{version}'
