name: asset
version: 1.22.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/asset/v1
          service_config: cloudasset_v1.yaml
        - path: google/cloud/asset/v1p2beta1
          service_config: cloudasset_v1p2beta1.yaml
        - path: google/cloud/asset/v1p5beta1
          service_config: cloudasset_v1p5beta1.yaml
go:
    source_roots:
        - asset
        - internal/generated/snippets/asset
    remove_regex:
        - ^internal/generated/snippets/asset/
        - ^asset/apiv1/[^/]*_client\.go$
        - ^asset/apiv1/[^/]*_client_example_go123_test\.go$
        - ^asset/apiv1/[^/]*_client_example_test\.go$
        - ^asset/apiv1/auxiliary\.go$
        - ^asset/apiv1/auxiliary_go123\.go$
        - ^asset/apiv1/doc\.go$
        - ^asset/apiv1/gapic_metadata\.json$
        - ^asset/apiv1/helpers\.go$
        - ^asset/apiv1/assetpb/.*$
        - ^asset/apiv1/\.repo-metadata\.json$
        - ^asset/apiv1p2beta1/[^/]*_client\.go$
        - ^asset/apiv1p2beta1/[^/]*_client_example_go123_test\.go$
        - ^asset/apiv1p2beta1/[^/]*_client_example_test\.go$
        - ^asset/apiv1p2beta1/auxiliary\.go$
        - ^asset/apiv1p2beta1/auxiliary_go123\.go$
        - ^asset/apiv1p2beta1/doc\.go$
        - ^asset/apiv1p2beta1/gapic_metadata\.json$
        - ^asset/apiv1p2beta1/helpers\.go$
        - ^asset/apiv1p2beta1/assetpb/.*$
        - ^asset/apiv1p2beta1/\.repo-metadata\.json$
        - ^asset/apiv1p5beta1/[^/]*_client\.go$
        - ^asset/apiv1p5beta1/[^/]*_client_example_go123_test\.go$
        - ^asset/apiv1p5beta1/[^/]*_client_example_test\.go$
        - ^asset/apiv1p5beta1/auxiliary\.go$
        - ^asset/apiv1p5beta1/auxiliary_go123\.go$
        - ^asset/apiv1p5beta1/doc\.go$
        - ^asset/apiv1p5beta1/gapic_metadata\.json$
        - ^asset/apiv1p5beta1/helpers\.go$
        - ^asset/apiv1p5beta1/assetpb/.*$
        - ^asset/apiv1p5beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/asset/
    tag_format: '{id}/v{version}'
