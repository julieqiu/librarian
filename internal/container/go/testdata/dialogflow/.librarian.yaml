name: dialogflow
version: 1.70.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/dialogflow/cx/v3
          service_config: dialogflow_v3.yaml
          grpc_service_config: dialogflow_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/dialogflow/cx/apiv3;cx
          release_level: ga
        - path: google/cloud/dialogflow/cx/v3beta1
          service_config: dialogflow_v3beta1.yaml
          grpc_service_config: dialogflow_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/dialogflow/cx/apiv3beta1;cx
          release_level: beta
        - path: google/cloud/dialogflow/v2
          service_config: dialogflow_v2.yaml
          grpc_service_config: dialogflow_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/dialogflow/apiv2;dialogflow
          release_level: ga
        - path: google/cloud/dialogflow/v2beta1
          service_config: dialogflow_v2beta1.yaml
          grpc_service_config: dialogflow_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/dialogflow/apiv2beta1;dialogflow
          release_level: beta
go:
    source_roots:
        - dialogflow
        - internal/generated/snippets/dialogflow
    remove_regex:
        - ^internal/generated/snippets/dialogflow/
        - ^dialogflow/apiv2/[^/]*_client\.go$
        - ^dialogflow/apiv2/[^/]*_client_example_go123_test\.go$
        - ^dialogflow/apiv2/[^/]*_client_example_test\.go$
        - ^dialogflow/apiv2/auxiliary\.go$
        - ^dialogflow/apiv2/auxiliary_go123\.go$
        - ^dialogflow/apiv2/doc\.go$
        - ^dialogflow/apiv2/gapic_metadata\.json$
        - ^dialogflow/apiv2/helpers\.go$
        - ^dialogflow/apiv2/dialogflowpb/.*$
        - ^dialogflow/apiv2/\.repo-metadata\.json$
        - ^dialogflow/apiv2beta1/[^/]*_client\.go$
        - ^dialogflow/apiv2beta1/[^/]*_client_example_go123_test\.go$
        - ^dialogflow/apiv2beta1/[^/]*_client_example_test\.go$
        - ^dialogflow/apiv2beta1/auxiliary\.go$
        - ^dialogflow/apiv2beta1/auxiliary_go123\.go$
        - ^dialogflow/apiv2beta1/doc\.go$
        - ^dialogflow/apiv2beta1/gapic_metadata\.json$
        - ^dialogflow/apiv2beta1/helpers\.go$
        - ^dialogflow/apiv2beta1/dialogflowpb/.*$
        - ^dialogflow/apiv2beta1/\.repo-metadata\.json$
        - ^dialogflow/cx/apiv3/[^/]*_client\.go$
        - ^dialogflow/cx/apiv3/[^/]*_client_example_go123_test\.go$
        - ^dialogflow/cx/apiv3/[^/]*_client_example_test\.go$
        - ^dialogflow/cx/apiv3/auxiliary\.go$
        - ^dialogflow/cx/apiv3/auxiliary_go123\.go$
        - ^dialogflow/cx/apiv3/doc\.go$
        - ^dialogflow/cx/apiv3/gapic_metadata\.json$
        - ^dialogflow/cx/apiv3/helpers\.go$
        - ^dialogflow/cx/apiv3/cxpb/.*$
        - ^dialogflow/cx/apiv3/\.repo-metadata\.json$
        - ^dialogflow/cx/apiv3beta1/[^/]*_client\.go$
        - ^dialogflow/cx/apiv3beta1/[^/]*_client_example_go123_test\.go$
        - ^dialogflow/cx/apiv3beta1/[^/]*_client_example_test\.go$
        - ^dialogflow/cx/apiv3beta1/auxiliary\.go$
        - ^dialogflow/cx/apiv3beta1/auxiliary_go123\.go$
        - ^dialogflow/cx/apiv3beta1/doc\.go$
        - ^dialogflow/cx/apiv3beta1/gapic_metadata\.json$
        - ^dialogflow/cx/apiv3beta1/helpers\.go$
        - ^dialogflow/cx/apiv3beta1/cxpb/.*$
        - ^dialogflow/cx/apiv3beta1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/dialogflow/
    tag_format: '{id}/v{version}'
