name: batch
version: 1.13.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/batch/v1
          service_config: batch_v1.yaml
          grpc_service_config: batch_v1_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/batch/apiv1;batch
          release_level: ga
go:
    source_roots:
        - batch
        - internal/generated/snippets/batch
    keep:
        - batch/apiv1/iam_policy_client.go
    remove_regex:
        - ^internal/generated/snippets/batch/
        - ^batch/apiv1/[^/]*_client\.go$
        - ^batch/apiv1/[^/]*_client_example_go123_test\.go$
        - ^batch/apiv1/[^/]*_client_example_test\.go$
        - ^batch/apiv1/auxiliary\.go$
        - ^batch/apiv1/auxiliary_go123\.go$
        - ^batch/apiv1/doc\.go$
        - ^batch/apiv1/gapic_metadata\.json$
        - ^batch/apiv1/helpers\.go$
        - ^batch/apiv1/batchpb/.*$
        - ^batch/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/batch/
    tag_format: '{id}/v{version}'
