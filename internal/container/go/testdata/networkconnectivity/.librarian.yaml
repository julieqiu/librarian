        - ^networkconnectivity/apiv1/auxiliary\.go$
        - ^networkconnectivity/apiv1/auxiliary_go123\.go$
        - ^networkconnectivity/apiv1/doc\.go$
        - ^networkconnectivity/apiv1/gapic_metadata\.json$
        - ^networkconnectivity/apiv1/helpers\.go$
        - ^networkconnectivity/apiv1/networkconnectivitypb/.*$
        - ^networkconnectivity/apiv1/\.repo-metadata\.json$
        - ^networkconnectivity/apiv1alpha1/[^/]*_client\.go$
        - ^networkconnectivity/apiv1alpha1/[^/]*_client_example_go123_test\.go$
        - ^networkconnectivity/apiv1alpha1/[^/]*_client_example_test\.go$
        - ^networkconnectivity/apiv1alpha1/auxiliary\.go$
        - ^networkconnectivity/apiv1alpha1/auxiliary_go123\.go$
        - ^networkconnectivity/apiv1alpha1/doc\.go$
        - ^networkconnectivity/apiv1alpha1/gapic_metadata\.json$
        - ^networkconnectivity/apiv1alpha1/helpers\.go$
        - ^networkconnectivity/apiv1alpha1/networkconnectivitypb/.*$
