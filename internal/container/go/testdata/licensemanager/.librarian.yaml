name: licensemanager
version: 0.1.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/licensemanager/v1
          service_config: licensemanager_v1.yaml
          grpc_service_config: licensemanager_v1_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          importpath: cloud.google.com/go/licensemanager/apiv1;licensemanager
          release_level: beta
go:
    source_roots:
        - licensemanager
        - internal/generated/snippets/licensemanager
    remove_regex:
        - ^internal/generated/snippets/licensemanager/
        - ^licensemanager/apiv1/[^/]*_client\.go$
        - ^licensemanager/apiv1/[^/]*_client_example_go123_test\.go$
        - ^licensemanager/apiv1/[^/]*_client_example_test\.go$
        - ^licensemanager/apiv1/auxiliary\.go$
        - ^licensemanager/apiv1/auxiliary_go123\.go$
        - ^licensemanager/apiv1/doc\.go$
        - ^licensemanager/apiv1/gapic_metadata\.json$
        - ^licensemanager/apiv1/helpers\.go$
        - ^licensemanager/apiv1/licensemanagerpb/.*$
        - ^licensemanager/apiv1/\.repo-metadata\.json$
    release_exclude_paths:
        - internal/generated/snippets/licensemanager/
    tag_format: '{id}/v{version}'
