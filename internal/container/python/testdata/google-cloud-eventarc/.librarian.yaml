name: google-cloud-eventarc
version: 1.17.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/eventarc/v1
          service_config: eventarc_v1.yaml
python:
    keep:
        - packages/google-cloud-eventarc/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-eventarc/
    metadata:
        name_pretty: Eventarc
        description: lets you asynchronously deliver events from Google services, SaaS, and your own apps using loosely coupled services that react to state changes. Eventarc requires no infrastructure management, you can optimize productivity and costs while building a modern, event-driven solution.
        distribution_name: google-cloud-eventarc
        api_id: eventarc.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/eventarc/
        client_documentation: https://cloud.google.com/python/docs/reference/eventarc/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
