name: google-cloud-managedkafka
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/managedkafka/v1
          service_config: managedkafka_v1.yaml
python:
    keep:
        - packages/google-cloud-managedkafka/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-managedkafka/
    metadata:
        name_pretty: Managed Service for Apache Kafka
        description: Managed Service for Apache Kafka API is a managed cloud service that lets you ingest Kafka streams directly into Google Cloud.
        distribution_name: google-cloud-managedkafka
        api_id: managedkafka.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/managed-kafka
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-managedkafka/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=1376234
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
