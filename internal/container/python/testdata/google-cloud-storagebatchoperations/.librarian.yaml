name: google-cloud-storagebatchoperations
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/storagebatchoperations/v1
          service_config: storagebatchoperations_v1.yaml
python:
    keep:
        - packages/google-cloud-storagebatchoperations/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-storagebatchoperations/
    py_gapic_library:
        google/cloud/storagebatchoperations/v1:
            grpc_service_config: storagebatchoperations_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Storage Batch Operations API
        description: 'null '
        distribution_name: google-cloud-storagebatchoperations
        api_id: storagebatchoperations.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/storage/docs/batch-operations/overview
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-storagebatchoperations/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=815827&template=1395449
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
