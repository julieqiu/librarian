name: google-cloud-iam-logging
version: 1.5.0
generate:
    specification_format: protobuf
    apis:
        - path: google/iam/v1/logging
python:
    keep:
        - packages/google-cloud-iam-logging/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
        - tests/unit/gapic/iam_logging_v1/test_iam_logging.py
    remove:
        - packages/google-cloud-iam-logging/
    py_gapic_library:
        google/iam/v1/logging:
            rest_numeric_enums: false
            transport: grpc
            opt_args:
                - google-cloud-iam-logging
                - google.cloud
                - iam_logging
    metadata:
        name_pretty: IAM Logging Protos
        distribution_name: google-cloud-iam-logging
        default_version: v1
        product_documentation: https://cloud.google.com/iam/docs/audit-logging
        client_documentation: https://cloud.google.com/python/docs/reference/iamlogging/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: stable
        library_type: OTHER
        repo: googleapis/google-cloud-python
