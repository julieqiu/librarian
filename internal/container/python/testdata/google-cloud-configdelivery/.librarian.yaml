name: google-cloud-configdelivery
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/configdelivery/v1beta
          service_config: configdelivery_v1beta.yaml
        - path: google/cloud/configdelivery/v1alpha
          service_config: configdelivery_v1alpha.yaml
        - path: google/cloud/configdelivery/v1
          service_config: configdelivery_v1.yaml
python:
    keep:
        - packages/google-cloud-configdelivery/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-configdelivery/
    py_gapic_library:
        google/cloud/configdelivery/v1:
            grpc_service_config: configdelivery_v1_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/configdelivery/v1alpha:
            grpc_service_config: configdelivery_v1alpha_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/configdelivery/v1beta:
            grpc_service_config: configdelivery_v1beta_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Config Delivery API
        description: ConfigDelivery service manages the deployment of kubernetes configuration to a fleet of kubernetes clusters.
        distribution_name: google-cloud-configdelivery
        api_id: configdelivery.googleapis.com
        default_version: v1alpha
        product_documentation: https://cloud.google.com/kubernetes-engine/enterprise/config-sync/docs/reference/rest
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-configdelivery/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
