name: google-cloud-datacatalog-lineage
version: 0.4.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/datacatalog/lineage/v1
          service_config: datalineage_v1.yaml
python:
    keep:
        - packages/google-cloud-datacatalog-lineage/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-datacatalog-lineage/
    py_gapic_library:
        google/cloud/datacatalog/lineage/v1:
            grpc_service_config: lineage_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.cloud
                - datacatalog_lineage
    metadata:
        name_pretty: Data Lineage API
        description: 'Data lineage is a Dataplex feature that lets you track how data moves through your systems: where it comes from, where it is passed to, and what transformations are applied to it.'
        distribution_name: google-cloud-datacatalog-lineage
        api_id: datalineage.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/data-catalog/docs/concepts/about-data-lineage
        client_documentation: https://cloud.google.com/python/docs/reference/lineage/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
