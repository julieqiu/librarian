name: google-cloud-documentai
version: 3.7.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/documentai/v1beta3
          service_config: documentai_v1beta3.yaml
        - path: google/cloud/documentai/v1
          service_config: documentai_v1.yaml
python:
    keep:
        - packages/google-cloud-documentai/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-documentai/
    py_gapic_library:
        google/cloud/documentai/v1:
            grpc_service_config: documentai_v1_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - autogen-snippets
        google/cloud/documentai/v1beta3:
            grpc_service_config: documentai_v1beta3_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - autogen-snippets
    metadata:
        name_pretty: Document AI
        description: Service to parse structured information from unstructured or semi-structured documents using state-of-the-art Google AI such as natural language, computer vision, translation, and AutoML.
        distribution_name: google-cloud-documentai
        api_id: documentai.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/document-ai/docs
        client_documentation: https://cloud.google.com/python/docs/reference/documentai/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
