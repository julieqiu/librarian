name: google-cloud-source-context
version: 1.8.0
generate:
    specification_format: protobuf
    apis:
        - path: google/devtools/source/v1
python:
    keep:
        - packages/google-cloud-source-context/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
        - tests/unit/gapic/source_context_v1/test_source_context_v1.py
    remove:
        - packages/google-cloud-source-context/
    py_gapic_library:
        google/devtools/source/v1:
            rest_numeric_enums: false
            transport: grpc
            opt_args:
                - google-cloud-source-context
                - google.cloud
                - source_context
    metadata:
        name_pretty: Source Context
        distribution_name: google-cloud-source-context
        api_id: source.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com
        client_documentation: https://cloud.google.com/python/docs/reference/source/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: stable
        library_type: OTHER
        repo: googleapis/google-cloud-python
