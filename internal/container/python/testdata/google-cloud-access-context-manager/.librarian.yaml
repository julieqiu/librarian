name: google-cloud-access-context-manager
version: 0.3.0
generate:
    specification_format: protobuf
    apis:
        - path: google/identity/accesscontextmanager/v1
          service_config: accesscontextmanager_v1.yaml
          grpc_service_config: accesscontextmanager_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
        - path: google/identity/accesscontextmanager/type
python:
    remove:
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/access_context_manager_pb2.py
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/access_context_manager_pb2.pyi
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/access_level_pb2.py
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/access_level_pb2.pyi
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/access_policy_pb2.py
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/access_policy_pb2.pyi
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/gcp_user_access_binding_pb2.py
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/gcp_user_access_binding_pb2.pyi
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/service_perimeter_pb2.py
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/v1/service_perimeter_pb2.pyi
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/type/device_resources_pb2.py
        - packages/google-cloud-access-context-manager/google/identity/accesscontextmanager/type/device_resources_pb2.pyi
    metadata:
        name_pretty: Access Context Manager
        distribution_name: google-cloud-access-context-manager
        default_version: apiVersion
        product_documentation: https://cloud.google.com/access-context-manager/docs/overview
        client_documentation: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-access-context-manager
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
