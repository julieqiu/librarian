name: google-cloud-securesourcemanager
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/securesourcemanager/v1
          service_config: securesourcemanager_v1.yaml
python:
    keep:
        - packages/google-cloud-securesourcemanager/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-securesourcemanager/
    metadata:
        name_pretty: Secure Source Manager API
        description: Regionally deployed, single-tenant managed source code repository hosted on Google Cloud.
        distribution_name: google-cloud-securesourcemanager
        api_id: securesourcemanager.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/secure-source-manager/docs/overview
        client_documentation: https://cloud.google.com/python/docs/reference/securesourcemanager/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
