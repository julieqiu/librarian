name: google-cloud-servicehealth
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/servicehealth/v1
          service_config: servicehealth_v1.yaml
python:
    keep:
        - packages/google-cloud-servicehealth/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-servicehealth/
    py_gapic_library:
        google/cloud/servicehealth/v1:
            grpc_service_config: servicehealth_v1_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Service Health API
        description: Personalized Service Health helps you gain visibility into disruptive events impacting Google Cloud products.
        distribution_name: google-cloud-servicehealth
        api_id: servicehealth.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/service-health/docs/overview
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-servicehealth/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=1466723&template=1161103
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
