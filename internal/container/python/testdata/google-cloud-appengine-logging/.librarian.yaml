name: google-cloud-appengine-logging
version: 1.7.0
generate:
    specification_format: protobuf
    apis:
        - path: google/appengine/logging/v1
python:
    keep:
        - packages/google-cloud-appengine-logging/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
        - tests/unit/gapic/appengine_logging_v1/test_appengine_logging_v1.py
    remove:
        - packages/google-cloud-appengine-logging/
    py_gapic_library:
        google/appengine/logging/v1:
            rest_numeric_enums: false
            transport: grpc
            opt_args:
                - google-cloud-appengine-logging
                - google.cloud
                - appengine_logging
    metadata:
        name_pretty: App Engine Logging Protos
        distribution_name: google-cloud-appengine-logging
        default_version: v1
        product_documentation: https://cloud.google.com/logging/docs/reference/v2/rpc/google.appengine.logging.v1
        client_documentation: https://cloud.google.com/python/docs/reference/appenginelogging/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: stable
        library_type: OTHER
        repo: googleapis/google-cloud-python
