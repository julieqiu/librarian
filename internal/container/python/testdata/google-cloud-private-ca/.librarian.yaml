name: google-cloud-private-ca
version: 1.16.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/security/privateca/v1
          service_config: privateca_v1.yaml
        - path: google/cloud/security/privateca/v1beta1
          service_config: privateca_v1beta1.yaml
python:
    keep:
        - packages/google-cloud-private-ca/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-private-ca/
    py_gapic_library:
        google/cloud/security/privateca/v1:
            grpc_service_config: privateca_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google-cloud-private-ca
        google/cloud/security/privateca/v1beta1:
            grpc_service_config: privateca_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google-cloud-private-ca
    metadata:
        name_pretty: Private Certificate Authority
        description: simplifies the deployment and management of private CAs without managing infrastructure.
        distribution_name: google-cloud-private-ca
        api_id: privateca.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/certificate-authority-service
        client_documentation: https://cloud.google.com/python/docs/reference/privateca/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
