name: google-cloud-alloydb
version: 0.6.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/alloydb/v1beta
          service_config: alloydb_v1beta.yaml
        - path: google/cloud/alloydb/v1
          service_config: alloydb_v1.yaml
        - path: google/cloud/alloydb/v1alpha
          service_config: alloydb_v1alpha.yaml
python:
    keep:
        - packages/google-cloud-alloydb/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-alloydb/
    metadata:
        name_pretty: AlloyDB
        distribution_name: google-cloud-alloydb
        api_id: alloydb.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/alloydb/
        client_documentation: https://cloud.google.com/python/docs/reference/alloydb/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
