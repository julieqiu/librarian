name: google-maps-mapsplatformdatasets
version: 0.5.0
generate:
    specification_format: protobuf
    apis:
        - path: google/maps/mapsplatformdatasets/v1
          service_config: mapsplatformdatasets_v1.yaml
python:
    keep:
        - packages/google-maps-mapsplatformdatasets/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-maps-mapsplatformdatasets
    py_gapic_library:
        google/maps/mapsplatformdatasets/v1:
            grpc_service_config: mapsplatformdatasets_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Maps Platform Datasets API
        description: Maps Platform Datasets API
        distribution_name: google-maps-mapsplatformdatasets
        api_id: mapsplatformdatasets.googleapis.com
        default_version: v1
        product_documentation: https://developers.google.com/maps
        client_documentation: https://googleapis.dev/python/mapsplatformdatasets/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
