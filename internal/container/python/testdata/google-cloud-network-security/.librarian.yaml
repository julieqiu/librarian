name: google-cloud-network-security
version: 0.9.21
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/networksecurity/v1alpha1
          service_config: networksecurity_v1alpha1.yaml
        - path: google/cloud/networksecurity/v1beta1
          service_config: networksecurity_v1beta1.yaml
        - path: google/cloud/networksecurity/v1
          service_config: networksecurity_v1.yaml
python:
    keep:
        - packages/google-cloud-network-security/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-network-security
    metadata:
        name_pretty: Network Security
        distribution_name: google-cloud-network-security
        api_id: networksecurity.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/traffic-director/docs/reference/network-security/rest
        client_documentation: https://cloud.google.com/python/docs/reference/networksecurity/latest
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
