name: google-cloud-geminidataanalytics
version: 0.5.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/geminidataanalytics/v1beta
          service_config: geminidataanalytics_v1beta.yaml
        - path: google/cloud/geminidataanalytics/v1alpha
          service_config: geminidataanalytics_v1alpha.yaml
python:
    keep:
        - packages/google-cloud-geminidataanalytics/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-geminidataanalytics/
    metadata:
        name_pretty: Data Analytics API with Gemini
        description: Developers can use the Conversational Analytics API, accessed through geminidataanalytics.googleapis.com, to build an artificial intelligence (AI)-powered chat interface, or data agent, that answers questions about structured data in BigQuery, Looker, and Looker Studio using natural language.
        distribution_name: google-cloud-geminidataanalytics
        api_id: geminidataanalytics.googleapis.com
        default_version: v1alpha
        product_documentation: https://cloud.google.com/gemini/docs/conversational-analytics-api/overview
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-geminidataanalytics/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
