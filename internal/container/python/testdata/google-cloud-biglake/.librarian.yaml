name: google-cloud-biglake
version: 0.1.1
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/biglake/v1
          service_config: biglake_v1.yaml
python:
    keep:
        - packages/google-cloud-biglake/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-biglake
    metadata:
        name_pretty: BigLake API
        description: The BigLake API provides access to BigLake Metastore, a serverless, fully managed, and highly available metastore for open-source data that can be used for querying Apache Iceberg tables in BigQuery.
        distribution_name: google-cloud-biglake
        api_id: biglake.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/bigquery/docs/iceberg-tables#create-using-biglake-metastore
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-biglake/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
