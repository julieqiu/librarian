name: google-cloud-billing-budgets
version: 1.18.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/billing/budgets/v1
          service_config: billingbudgets.yaml
        - path: google/cloud/billing/budgets/v1beta1
          service_config: billingbudgets.yaml
python:
    keep:
        - packages/google-cloud-billing-budgets/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-billing-budgets/
    metadata:
        name_pretty: Cloud Billing Budget
        description: The Cloud Billing Budget API stores Cloud Billing budgets, which define a budget plan and the rules to execute as spend is tracked against that plan.
        distribution_name: google-cloud-billing-budgets
        api_id: billingbudgets.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/billing/docs/how-to/budget-api-overview
        client_documentation: https://cloud.google.com/python/docs/reference/billingbudgets/latest
        issue_tracker: https://issuetracker.google.com/savedsearches/559770
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
