name: google-cloud-webrisk
version: 1.19.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/webrisk/v1beta1
          service_config: webrisk_v1beta1.yaml
        - path: google/cloud/webrisk/v1
          service_config: webrisk_v1.yaml
python:
    keep:
        - packages/google-cloud-webrisk/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-webrisk/
    metadata:
        name_pretty: Web Risk
        description: is a Google Cloud service that lets client applications check URLs against Google's constantly updated lists of unsafe web resources. Unsafe web resources include social engineering sites—such as phishing and deceptive sites—and sites that host malware or unwanted software. With the Web Risk API, you can quickly identify known bad sites, warn users before they click infected links, and prevent users from posting links to known infected pages from your site. The Web Risk API includes data on more than a million unsafe URLs and stays up to date by examining billions of URLs each day.
        distribution_name: google-cloud-webrisk
        api_id: webrisk.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/web-risk/docs/
        client_documentation: https://cloud.google.com/python/docs/reference/webrisk/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
