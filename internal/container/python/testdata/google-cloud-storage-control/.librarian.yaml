name: google-cloud-storage-control
version: 1.8.0
generate:
    specification_format: protobuf
    apis:
        - path: google/storage/control/v2
          service_config: storage_v2.yaml
python:
    keep:
        - packages/google-cloud-storage-control/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-storage-control/
    py_gapic_library:
        google/storage/control/v2:
            grpc_service_config: storage_control_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.cloud
                - storage_control
                - google-cloud-storage-control
    metadata:
        name_pretty: Storage Control API
        description: Lets you perform metadata-specific, control plane, and long-running operations apart from the Storage API. Separating these operations from the Storage API improves API standardization and lets you run faster releases.
        distribution_name: google-cloud-storage-control
        api_id: storage.googleapis.com
        default_version: v2
        product_documentation: https://cloud.google.com/storage/docs/reference/rpc/google.storage.control.v2
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-storage-control/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=187243&template=1162869
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
