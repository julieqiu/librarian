name: google-cloud-batch
version: 0.18.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/batch/v1alpha
          service_config: batch_v1alpha.yaml
        - path: google/cloud/batch/v1
          service_config: batch_v1.yaml
python:
    keep:
        - packages/google-cloud-batch/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-batch/
    metadata:
        name_pretty: Cloud Batch
        distribution_name: google-cloud-batch
        api_id: batch.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/batch/docs
        client_documentation: https://cloud.google.com/python/docs/reference/batch/latest
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
