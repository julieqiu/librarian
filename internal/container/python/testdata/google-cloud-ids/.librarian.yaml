name: google-cloud-ids
version: 1.11.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/ids/v1
          service_config: ids_v1.yaml
python:
    keep:
        - packages/google-cloud-ids/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-ids/
    py_gapic_library:
        google/cloud/ids/v1:
            grpc_service_config: ids_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Cloud IDS
        description: Cloud IDS is an intrusion detection service that provides threat detection for intrusions, malware, spyware, and command-and-control attacks on your network. Cloud IDS works by creating a Google-managed peered network with mirrored VMs. Traffic in the peered network is mirrored, and then inspected by Palo Alto Networks threat protection technologies to provide advanced threat detection.
        distribution_name: google-cloud-ids
        api_id: ids.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/intrusion-detection-system/
        client_documentation: https://cloud.google.com/python/docs/reference/ids/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
