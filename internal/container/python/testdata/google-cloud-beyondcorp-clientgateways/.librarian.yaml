name: google-cloud-beyondcorp-clientgateways
version: 0.5.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/beyondcorp/clientgateways/v1
          service_config: beyondcorp_v1.yaml
python:
    keep:
        - packages/google-cloud-beyondcorp-clientgateways/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-beyondcorp-clientgateways/
    py_gapic_library:
        google/cloud/beyondcorp/clientgateways/v1:
            grpc_service_config: beyondcorp-clientgateways_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google-cloud-beyondcorp-clientgateways
                - google.cloud
                - beyondcorp_clientgateways
    metadata:
        name_pretty: BeyondCorp ClientGateways
        description: Beyondcorp Enterprise provides identity and context aware access controls for enterprise resources and enables zero-trust access. Using the Beyondcorp Enterprise APIs, enterprises can set up multi-cloud and on-prem connectivity using the App Connector hybrid connectivity solution.
        distribution_name: google-cloud-beyondcorp-clientgateways
        api_id: beyondcorp.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/beyondcorp/
        client_documentation: https://cloud.google.com/python/docs/reference/beyondcorpclientgateways/latest
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
