name: google-cloud-workflows
version: 1.19.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/workflows/executions/v1
          service_config: workflowexecutions_v1.yaml
        - path: google/cloud/workflows/executions/v1beta
          service_config: workflowexecutions_v1beta.yaml
        - path: google/cloud/workflows/v1
          service_config: workflows_v1.yaml
        - path: google/cloud/workflows/v1beta
          service_config: workflows_v1beta.yaml
python:
    keep:
        - packages/google-cloud-workflows/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-workflows/
    metadata:
        name_pretty: Cloud Workflows
        description: Orchestrate and automate Google Cloud and HTTP-based API services with serverless workflows.
        distribution_name: google-cloud-workflows
        api_id: workflows.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/workflows/
        client_documentation: https://cloud.google.com/python/docs/reference/workflows/latest
        issue_tracker: https://issuetracker.google.com/savedsearches/559729
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
