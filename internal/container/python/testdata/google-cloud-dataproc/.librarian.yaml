name: google-cloud-dataproc
version: 5.23.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/dataproc/v1
          service_config: dataproc_v1.yaml
python:
    keep:
        - packages/google-cloud-dataproc/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-dataproc/
    metadata:
        name_pretty: Google Cloud Dataproc
        description: is a faster, easier, more cost-effective way to run Apache Spark and Apache Hadoop.
        distribution_name: google-cloud-dataproc
        api_id: dataproc.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/dataproc
        client_documentation: https://cloud.google.com/python/docs/reference/dataproc/latest
        issue_tracker: https://issuetracker.google.com/savedsearches/559745
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
