name: google-maps-routeoptimization
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/maps/routeoptimization/v1
          service_config: routeoptimization_v1.yaml
python:
    keep:
        - packages/google-maps-routeoptimization/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - samples/README.rst
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-maps-routeoptimization
    py_gapic_library:
        google/maps/routeoptimization/v1:
            grpc_service_config: routeoptimization_v1_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Route Optimization API
        description: The Route Optimization API assigns tasks and routes to a vehicle fleet, optimizing against the objectives and constraints that you supply for your transportation goals.
        distribution_name: google-maps-routeoptimization
        api_id: routeoptimization.googleapis.com
        default_version: v1
        product_documentation: https://developers.google.com/maps/documentation/route-optimization
        client_documentation: https://googleapis.dev/python/google-maps-routeoptimization/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=1546507
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
