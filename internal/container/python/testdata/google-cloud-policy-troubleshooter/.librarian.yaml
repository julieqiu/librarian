name: google-cloud-policy-troubleshooter
version: 1.14.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/policytroubleshooter/v1
          service_config: policytroubleshooter_v1.yaml
python:
    keep:
        - packages/google-cloud-policy-troubleshooter/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-policy-troubleshooter/
    metadata:
        name_pretty: IAM Policy Troubleshooter API
        description: makes it easier to understand why a user has access to a resource or doesn't have permission to call an API. Given an email, resource, and permission, Policy Troubleshooter examines all Identity and Access Management (IAM) policies that apply to the resource. It then reveals whether the member's roles include the permission on that resource and, if so, which policies bind the member to those roles.
        distribution_name: google-cloud-policy-troubleshooter
        api_id: policytroubleshooter.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/iam/docs/troubleshooting-access#rest-api/
        client_documentation: https://cloud.google.com/python/docs/reference/policytroubleshooter/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
