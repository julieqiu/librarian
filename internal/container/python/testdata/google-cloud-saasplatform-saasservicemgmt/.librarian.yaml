name: google-cloud-saasplatform-saasservicemgmt
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/saasplatform/saasservicemgmt/v1beta1
          service_config: saasservicemgmt_v1beta1.yaml
python:
    keep:
        - packages/google-cloud-saasplatform-saasservicemgmt/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-saasplatform-saasservicemgmt/
    py_gapic_library:
        google/cloud/saasplatform/saasservicemgmt/v1beta1:
            grpc_service_config: saasservicemgmt_v1beta1_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.cloud
                - saasplatform_saasservicemgmt
    metadata:
        name_pretty: SaaS Runtime API
        description: SaaS Runtime lets you store, host, manage, and monitor software as a service (SaaS) applications on Google Cloud.
        distribution_name: google-cloud-saasplatform-saasservicemgmt
        api_id: saasservicemgmt.googleapis.com
        default_version: v1beta1
        product_documentation: https://cloud.google.com/saas-runtime/docs/overview
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-saasplatform-saasservicemgmt/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
