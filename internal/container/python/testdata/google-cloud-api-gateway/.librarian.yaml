name: google-cloud-api-gateway
version: 1.13.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/apigateway/v1
          service_config: apigateway_v1.yaml
          grpc_service_config: apigateway_grpc_service_config.json
          rest_numeric_enums: true
          transport: grpc+rest
          opt_args:
            - warehouse-package-name=google-cloud-api-gateway
python:
    keep:
        - packages/google-cloud-api-gateway/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-api-gateway/
    metadata:
        name_pretty: API Gateway
        description: enables you to provide secure access to your backend services through a well-defined REST API that is consistent across all of your services, regardless of the service implementation. Clients consume your REST APIS to implement standalone apps for a mobile device or tablet, through apps running in a browser, or through any other type of app that can make a request to an HTTP endpoint.
        distribution_name: google-cloud-api-gateway
        api_id: apigateway.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/api-gateway
        client_documentation: https://cloud.google.com/python/docs/reference/apigateway/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
