name: google-cloud-dlp
version: 3.33.0
generate:
    specification_format: protobuf
    apis:
        - path: google/privacy/dlp/v2
          service_config: dlp_v2.yaml
python:
    keep:
        - packages/google-cloud-dlp/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-dlp/
    py_gapic_library:
        google/privacy/dlp/v2:
            grpc_service_config: dlp_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - python-gapic-namespace=google.cloud
    metadata:
        name_pretty: Cloud Data Loss Prevention
        description: provides programmatic access to a powerful detection engine for personally identifiable information and other privacy-sensitive data in unstructured data streams, like text blocks and images.
        distribution_name: google-cloud-dlp
        api_id: dlp.googleapis.com
        default_version: v2
        product_documentation: https://cloud.google.com/dlp/docs/
        client_documentation: https://cloud.google.com/python/docs/reference/dlp/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
