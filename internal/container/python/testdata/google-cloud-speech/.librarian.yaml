name: google-cloud-speech
version: 2.34.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/speech/v1
          service_config: speech_v1.yaml
        - path: google/cloud/speech/v2
          service_config: speech_v2.yaml
        - path: google/cloud/speech/v1p1beta1
          service_config: speech_v1p1beta1.yaml
python:
    keep:
        - packages/google-cloud-speech/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - google/cloud/speech_v1/helpers.py
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
        - tests/unit/test_helpers.py
    remove:
        - packages/google-cloud-speech/
    py_gapic_library:
        google/cloud/speech/v1:
            grpc_service_config: speech_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/speech/v1p1beta1:
            grpc_service_config: speech_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/speech/v2:
            grpc_service_config: speech_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Cloud Speech
        description: enables easy integration of Google speech recognition technologies into developer applications. Send audio and receive a text transcription from the Speech-to-Text API service.
        distribution_name: google-cloud-speech
        api_id: speech.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/speech-to-text/docs/
        client_documentation: https://cloud.google.com/python/docs/reference/speech/latest
        issue_tracker: https://issuetracker.google.com/savedsearches/559758
        release_level: stable
        library_type: GAPIC_COMBO
        repo: googleapis/google-cloud-python
