name: google-cloud-alloydb-connectors
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/alloydb/connectors/v1
          service_config: connectors_v1.yaml
          rest_numeric_enums: false
          transport: grpc+rest
        - path: google/cloud/alloydb/connectors/v1alpha
          service_config: connectors_v1alpha.yaml
          rest_numeric_enums: false
          transport: grpc+rest
        - path: google/cloud/alloydb/connectors/v1beta
          service_config: connectors_v1beta.yaml
          rest_numeric_enums: false
          transport: grpc+rest
python:
    keep:
        - packages/google-cloud-alloydb-connectors/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
        - tests/unit/gapic/connectors_v1/test_connectors.py
    remove:
        - packages/google-cloud-alloydb-connectors/
    metadata:
        name_pretty: AlloyDB connectors
        description: provides enterprise-grade performance and availability while maintaining 100% compatibility with open-source PostgreSQL.
        distribution_name: google-cloud-alloydb-connectors
        api_id: connectors.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/alloydb/docs
        client_documentation: https://cloud.google.com/python/docs/reference/connectors/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=1194526&template=1689942
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
