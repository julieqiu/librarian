name: google-cloud-tpu
version: 1.24.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/tpu/v2alpha1
          service_config: tpu_v2alpha1.yaml
        - path: google/cloud/tpu/v2
          service_config: tpu_v2.yaml
        - path: google/cloud/tpu/v1
          service_config: tpu_v1.yaml
python:
    keep:
        - packages/google-cloud-tpu/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-tpu/
    py_gapic_library:
        google/cloud/tpu/v1:
            grpc_service_config: tpu_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc
        google/cloud/tpu/v2:
            grpc_service_config: tpu_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/tpu/v2alpha1:
            grpc_service_config: tpu_grpc_service_config.json
            rest_numeric_enums: false
            transport: grpc
    metadata:
        name_pretty: Cloud TPU
        description: Cloud Tensor Processing Units (TPUs) are Google's custom-developed application-specific integrated circuits (ASICs) used to accelerate machine learning workloads.
        distribution_name: google-cloud-tpu
        api_id: tpu.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/tpu/
        client_documentation: https://cloud.google.com/python/docs/reference/tpu/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
