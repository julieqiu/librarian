name: google-cloud-network-management
version: 1.29.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/networkmanagement/v1
          service_config: networkmanagement_v1.yaml
python:
    keep:
        - packages/google-cloud-network-management/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-network-management/
    py_gapic_library:
        google/cloud/networkmanagement/v1:
            grpc_service_config: networkmanagement_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - network_management
                - google.cloud
                - google-cloud-network-management
    metadata:
        name_pretty: Network Management
        description: provides a collection of network performance monitoring and diagnostic capabilities.
        distribution_name: google-cloud-network-management
        api_id: networkmanagement.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/network-management
        client_documentation: https://cloud.google.com/python/docs/reference/networkmanagement/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
