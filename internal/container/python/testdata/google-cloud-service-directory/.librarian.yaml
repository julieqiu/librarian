name: google-cloud-service-directory
version: 1.15.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/servicedirectory/v1
          service_config: servicedirectory_v1.yaml
        - path: google/cloud/servicedirectory/v1beta1
          service_config: servicedirectory_v1beta1.yaml
python:
    keep:
        - packages/google-cloud-service-directory/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-service-directory/
    py_gapic_library:
        google/cloud/servicedirectory/v1:
            grpc_service_config: servicedirectory_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - warehouse-package-name=google-cloud-service-directory
        google/cloud/servicedirectory/v1beta1:
            grpc_service_config: servicedirectory_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - warehouse-package-name=google-cloud-service-directory
    metadata:
        name_pretty: Service Directory
        description: Allows the registration and lookup of services.
        distribution_name: google-cloud-service-directory
        api_id: servicedirectory.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/service-directory/
        client_documentation: https://cloud.google.com/python/docs/reference/servicedirectory/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
