name: google-cloud-privilegedaccessmanager
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/privilegedaccessmanager/v1
          service_config: privilegedaccessmanager_v1.yaml
python:
    keep:
        - packages/google-cloud-privilegedaccessmanager/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-privilegedaccessmanager/
    metadata:
        name_pretty: Privileged Access Manager API
        description: Privileged Access Manager (PAM) helps you on your journey towards least privilege and helps mitigate risks tied to privileged access misuse or abuse. PAM allows you to shift from always-on standing privileges towards on-demand access with just-in-time, time-bound, and approval-based access elevations. PAM allows IAM administrators to create entitlements that can grant just-in-time, temporary access to any resource scope. Requesters can explore eligible entitlements and request the access needed for their task. Approvers are notified when approvals await their decision. Streamlined workflows facilitated by using PAM can support various use cases, including emergency access for incident responders, time-boxed access for developers for critical deployment or maintenance, temporary access for operators for data ingestion and audits, JIT access to service accounts for automated tasks, and more.
        distribution_name: google-cloud-privilegedaccessmanager
        api_id: privilegedaccessmanager.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/iam/docs/pam-overview
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-privilegedaccessmanager/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
