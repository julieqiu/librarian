name: google-cloud-financialservices
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/financialservices/v1
          service_config: financialservices_v1.yaml
python:
    keep:
        - packages/google-cloud-financialservices/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-financialservices/
    py_gapic_library:
        google/cloud/financialservices/v1:
            grpc_service_config: financialservices_v1_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Anti Money Laundering AI API
        description: Google Cloud's Anti Money Laundering AI (AML AI) product is an API that scores AML risk. Use it to identify more risk, more defensibly, with fewer false positives and reduced time per review.
        distribution_name: google-cloud-financialservices
        api_id: financialservices.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/financial-services/anti-money-laundering/docs/concepts/overview
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-financialservices/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
