name: google-cloud-recaptcha-enterprise
version: 1.29.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/recaptchaenterprise/v1
          service_config: recaptchaenterprise_v1.yaml
python:
    keep:
        - packages/google-cloud-recaptcha-enterprise/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-recaptcha-enterprise/
    metadata:
        name_pretty: reCAPTCHA Enterprise
        description: protect your website from fraudulent activity like scraping, credential stuffing, and automated account creation.
        distribution_name: google-cloud-recaptcha-enterprise
        api_id: recaptchaenterprise.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/recaptcha-enterprise
        client_documentation: https://cloud.google.com/python/docs/reference/recaptchaenterprise/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
