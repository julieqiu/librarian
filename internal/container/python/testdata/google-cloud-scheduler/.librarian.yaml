name: google-cloud-scheduler
version: 2.17.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/scheduler/v1
          service_config: cloudscheduler_v1.yaml
        - path: google/cloud/scheduler/v1beta1
          service_config: cloudscheduler_v1beta1.yaml
python:
    keep:
        - packages/google-cloud-scheduler/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-scheduler/
    metadata:
        name_pretty: Cloud Scheduler
        description: lets you set up scheduled units of work to be executed at defined times or regular intervals. These work units are commonly known as cron jobs. Typical use cases might include sending out a report email on a daily basis, updating some cached data every 10 minutes, or updating some summary information once an hour.
        distribution_name: google-cloud-scheduler
        api_id: cloudscheduler.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/scheduler/docs
        client_documentation: https://cloud.google.com/python/docs/reference/cloudscheduler/latest
        issue_tracker: https://issuetracker.google.com/savedsearches/5411429
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
