name: google-cloud-bigquery-reservation
version: 1.21.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/bigquery/reservation/v1
          service_config: bigqueryreservation_v1.yaml
python:
    keep:
        - packages/google-cloud-bigquery-reservation/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-bigquery-reservation/
    metadata:
        name_pretty: BigQuery Reservation
        description: Modify BigQuery flat-rate reservations.
        distribution_name: google-cloud-bigquery-reservation
        api_id: bigqueryreservation.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/bigquery/docs/reference/reservations
        client_documentation: https://cloud.google.com/python/docs/reference/bigqueryreservation/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
