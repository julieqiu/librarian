name: google-cloud-deploy
version: 2.8.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/deploy/v1
          service_config: clouddeploy_v1.yaml
python:
    keep:
        - packages/google-cloud-deploy/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-deploy/
    metadata:
        name_pretty: Google Cloud Deploy
        description: is a service that automates delivery of your applications to a series of target environments in a defined sequence
        distribution_name: google-cloud-deploy
        api_id: clouddeploy.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/deploy/
        client_documentation: https://cloud.google.com/python/docs/reference/clouddeploy/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
