name: google-cloud-life-sciences
version: 0.10.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/lifesciences/v2beta
          service_config: lifesciences_v2beta.yaml
python:
    keep:
        - packages/google-cloud-life-sciences/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-life-sciences/
    py_gapic_library:
        google/cloud/lifesciences/v2beta:
            grpc_service_config: lifesciences_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - warehouse-package-name=google-cloud-life-sciences
    metadata:
        name_pretty: Cloud Life Sciences
        description: is a suite of services and tools for managing, processing, and transforming life sciences data.
        distribution_name: google-cloud-life-sciences
        api_id: lifesciences.googleapis.com
        default_version: v2beta
        product_documentation: https://cloud.google.com/life-sciences/
        client_documentation: https://cloud.google.com/python/docs/reference/lifesciences/latest
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
