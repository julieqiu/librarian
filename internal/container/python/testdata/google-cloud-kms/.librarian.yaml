name: google-cloud-kms
version: 3.7.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/kms/v1
          service_config: cloudkms_v1.yaml
python:
    keep:
        - packages/google-cloud-kms/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-kms/
    metadata:
        name_pretty: Google Cloud Key Management Service
        description: a cloud-hosted key management service that lets you manage cryptographic keys for your cloud services the same way you do on-premises. You can generate, use, rotate, and destroy AES256, RSA 2048, RSA 3072, RSA 4096, EC P256, and EC P384 cryptographic keys. Cloud KMS is integrated with Cloud IAM and Cloud Audit Logging so that you can manage permissions on individual keys and monitor how these are used. Use Cloud KMS to protect secrets and other sensitive data that you need to store in Google Cloud Platform.
        distribution_name: google-cloud-kms
        api_id: cloudkms.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/kms
        client_documentation: https://cloud.google.com/python/docs/reference/cloudkms/latest
        issue_tracker: https://issuetracker.google.com/savedsearches/5264932
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
