name: google-shopping-merchant-issueresolution
version: 1.1.0
generate:
    specification_format: protobuf
    apis:
        - path: google/shopping/merchant/issueresolution/v1
          service_config: merchantapi_v1.yaml
        - path: google/shopping/merchant/issueresolution/v1beta
          service_config: merchantapi_v1beta.yaml
python:
    keep:
        - packages/google-shopping-merchant-issueresolution/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-shopping-merchant-issueresolution/
    py_gapic_library:
        google/shopping/merchant/issueresolution/v1:
            grpc_service_config: issueresolution_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.shopping.type
                - merchant_issueresolution
                - google.shopping
        google/shopping/merchant/issueresolution/v1beta:
            grpc_service_config: issueresolution_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.shopping.type
                - google.shopping
                - merchant_issueresolution
    metadata:
        name_pretty: Merchant API
        description: 'Programmatically manage your Merchant Center Accounts. '
        distribution_name: google-shopping-merchant-issueresolution
        api_id: issueresolution.googleapis.com
        default_version: v1
        product_documentation: https://developers.google.com/merchant/api
        client_documentation: https://googleapis.dev/python/google-shopping-merchant-issueresolution/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=171084&template=555201
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
