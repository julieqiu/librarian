name: google-ai-generativelanguage
version: 0.9.0
generate:
    specification_format: protobuf
    apis:
        - path: google/ai/generativelanguage/v1
          service_config: generativelanguage_v1.yaml
        - path: google/ai/generativelanguage/v1beta
          service_config: generativelanguage_v1beta.yaml
        - path: google/ai/generativelanguage/v1beta3
          service_config: generativelanguage_v1beta3.yaml
        - path: google/ai/generativelanguage/v1beta2
          service_config: generativelanguage_v1beta2.yaml
        - path: google/ai/generativelanguage/v1alpha
          service_config: generativelanguage_v1alpha.yaml
python:
    keep:
        - packages/google-ai-generativelanguage/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-ai-generativelanguage/
    metadata:
        name_pretty: Generative Language API
        description: The Gemini API allows developers to build generative AI applications using Gemini models. Gemini is our most capable model, built from the ground up to be multimodal. It can generalize and seamlessly understand, operate across, and combine different types of information including language, images, audio, video, and code. You can use the Gemini API for use cases like reasoning across text and images, content generation, dialogue agents, summarization and classification systems, and more.
        distribution_name: google-ai-generativelanguage
        api_id: generativelanguage.googleapis.com
        default_version: v1beta
        product_documentation: https://ai.google.dev/docs
        client_documentation: https://googleapis.dev/python/generativelanguage/latest
        issue_tracker: https://github.com/google/generative-ai-python/issues/new
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
