name: google-shopping-merchant-quota
version: 1.1.0
generate:
    specification_format: protobuf
    apis:
        - path: google/shopping/merchant/quota/v1beta
          service_config: merchantapi_v1beta.yaml
        - path: google/shopping/merchant/quota/v1
          service_config: merchantapi_v1.yaml
python:
    keep:
        - packages/google-shopping-merchant-quota/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-shopping-merchant-quota/
    py_gapic_library:
        google/shopping/merchant/quota/v1:
            grpc_service_config: quota_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.shopping
                - merchant_quota
        google/shopping/merchant/quota/v1beta:
            grpc_service_config: quota_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.shopping
                - merchant_quota
    metadata:
        name_pretty: Shopping Merchant Quota
        description: Programmatically manage your Merchant Center accounts.
        distribution_name: google-shopping-merchant-quota
        api_id: merchantapi.googleapis.com
        default_version: v1
        product_documentation: https://developers.google.com/merchant/api
        client_documentation: https://googleapis.dev/python/google-shopping-merchant-quota/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=171084&template=555201
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
