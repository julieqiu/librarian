name: google-maps-fleetengine-delivery
version: 0.3.0
generate:
    specification_format: protobuf
    apis:
        - path: google/maps/fleetengine/delivery/v1
          service_config: fleetengine_v1.yaml
python:
    keep:
        - packages/google-maps-fleetengine-delivery/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-maps-fleetengine-delivery
    metadata:
        name_pretty: Last Mile Fleet Solution Delivery API
        description: Enables Fleet Engine for access to the On Demand Rides and Deliveries and Last Mile Fleet Solution APIs.  Customer's use of Google Maps Content in the Cloud Logging Services is subject to the Google Maps Platform Terms of Service located at https://cloud.google.com/maps-platform/terms.
        distribution_name: google-maps-fleetengine-delivery
        api_id: fleetengine.googleapis.com
        default_version: v1
        product_documentation: https://developers.google.com/maps/documentation/transportation-logistics/mobility
        client_documentation: https://googleapis.dev/python/fleetengine-delivery/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
