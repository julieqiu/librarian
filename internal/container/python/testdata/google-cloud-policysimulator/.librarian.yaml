name: google-cloud-policysimulator
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/policysimulator/v1
          service_config: policysimulator_v1.yaml
python:
    keep:
        - packages/google-cloud-policysimulator/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-policysimulator/
    metadata:
        name_pretty: Policy Simulator API
        description: Policy Simulator is a collection of endpoints for creating, running, and viewing a `Replay`. A `Replay` is a type of simulation that lets you see how your members' access to resources might change if you changed your IAM policy.
        distribution_name: google-cloud-policysimulator
        api_id: policysimulator.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/policy-intelligence/docs/iam-simulator-overview
        client_documentation: https://cloud.google.com/python/docs/reference/policysimulator/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
