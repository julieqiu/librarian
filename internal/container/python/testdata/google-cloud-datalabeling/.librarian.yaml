name: google-cloud-datalabeling
version: 1.14.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/datalabeling/v1beta1
          service_config: datalabeling_v1beta1.yaml
python:
    keep:
        - packages/google-cloud-datalabeling/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-datalabeling/
    py_gapic_library:
        google/cloud/datalabeling/v1beta1:
            grpc_service_config: datalabeling_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc
    metadata:
        name_pretty: Google Cloud Data Labeling
        description: is a service that lets you work with human labelers to generate highly accurate labels for a collection of data that you can use to train your machine learning models.
        distribution_name: google-cloud-datalabeling
        api_id: datalabeling.googleapis.com
        default_version: v1beta1
        product_documentation: https://cloud.google.com/data-labeling/docs/
        client_documentation: https://cloud.google.com/python/docs/reference/datalabeling/latest
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
