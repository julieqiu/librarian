name: google-cloud-videointelligence
version: 2.17.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/videointelligence/v1p3beta1
          service_config: videointelligence_v1p3beta1.yaml
        - path: google/cloud/videointelligence/v1
          service_config: videointelligence_v1.yaml
        - path: google/cloud/videointelligence/v1p2beta1
          service_config: videointelligence_v1p2beta1.yaml
        - path: google/cloud/videointelligence/v1p1beta1
          service_config: videointelligence_v1p1beta1.yaml
        - path: google/cloud/videointelligence/v1beta2
          service_config: videointelligence_v1beta2.yaml
python:
    keep:
        - packages/google-cloud-videointelligence/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-videointelligence/
    py_gapic_library:
        google/cloud/videointelligence/v1:
            grpc_service_config: videointelligence_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/videointelligence/v1beta2:
            grpc_service_config: videointelligence_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/videointelligence/v1p1beta1:
            grpc_service_config: videointelligence_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/videointelligence/v1p2beta1:
            grpc_service_config: videointelligence_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/videointelligence/v1p3beta1:
            grpc_service_config: videointelligence_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc
    metadata:
        name_pretty: Video Intelligence
        description: makes videos searchable, and discoverable, by extracting metadata with an easy to use API. You can now search every moment of every video file in your catalog and find every occurrence as well as its significance. It quickly annotates videos stored in Google Cloud Storage, and helps you identify key nouns entities of your video, and when they occur within the video. Separate signal from noise, by retrieving relevant information at the video, shot or per frame.
        distribution_name: google-cloud-videointelligence
        api_id: videointelligence.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/video-intelligence/docs/
        client_documentation: https://cloud.google.com/python/docs/reference/videointelligence/latest
        issue_tracker: https://issuetracker.google.com/savedsearches/5084810
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
