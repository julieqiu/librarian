name: google-cloud-workstations
version: 0.6.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/workstations/v1beta
          service_config: workstations_v1beta.yaml
        - path: google/cloud/workstations/v1
          service_config: workstations_v1.yaml
python:
    keep:
        - packages/google-cloud-workstations/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-workstations/
    py_gapic_library:
        google/cloud/workstations/v1:
            grpc_service_config: workstations_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/workstations/v1beta:
            grpc_service_config: workstations_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Cloud Workstations
        distribution_name: google-cloud-workstations
        api_id: workstations.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/workstations/
        client_documentation: https://cloud.google.com/python/docs/reference/workstations/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
