name: google-cloud-backupdr
version: 0.3.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/backupdr/v1
          service_config: backupdr_v1.yaml
python:
    keep:
        - packages/google-cloud-backupdr/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-backupdr/
    py_gapic_library:
        google/cloud/backupdr/v1:
            grpc_service_config: backupdr_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Backup and DR Service API
        description: Backup and DR Service ensures that your data is managed, protected, and accessible using both hybrid and cloud-based backup/recovery appliances that are managed using the Backup and DR management console.
        distribution_name: google-cloud-backupdr
        api_id: backupdr.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/backup-disaster-recovery/docs/concepts/backup-dr
        client_documentation: https://cloud.google.com/python/docs/reference/backupdr/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=966572
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
