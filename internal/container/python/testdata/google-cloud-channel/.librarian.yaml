name: google-cloud-channel
version: 1.24.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/channel/v1
          service_config: cloudchannel_v1.yaml
python:
    keep:
        - packages/google-cloud-channel/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-channel/
    metadata:
        name_pretty: Channel Services
        description: With Channel Services, Google Cloud partners and resellers have a single unified resale platform, with a unified resale catalog, customer management, order management, billing management, policy and authorization management, and cost management.
        distribution_name: google-cloud-channel
        api_id: cloudchannel.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/channel/
        client_documentation: https://cloud.google.com/python/docs/reference/cloudchannel/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
