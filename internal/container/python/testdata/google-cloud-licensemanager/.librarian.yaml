name: google-cloud-licensemanager
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/licensemanager/v1
          service_config: licensemanager_v1.yaml
python:
    keep:
        - packages/google-cloud-licensemanager/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-licensemanager/
    metadata:
        name_pretty: License Manager API
        description: 'License Manager is a tool to manage and track third-party licenses on Google Cloud. '
        distribution_name: google-cloud-licensemanager
        api_id: licensemanager.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/compute/docs/instances/windows/ms-licensing
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-licensemanager/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=1659587
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
