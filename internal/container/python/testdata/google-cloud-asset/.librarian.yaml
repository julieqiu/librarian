name: google-cloud-asset
version: 4.1.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/asset/v1p5beta1
          service_config: cloudasset_v1p5beta1.yaml
        - path: google/cloud/asset/v1
          service_config: cloudasset_v1.yaml
        - path: google/cloud/asset/v1p1beta1
          service_config: cloudasset_v1p1beta1.yaml
        - path: google/cloud/asset/v1p2beta1
          service_config: cloudasset_v1p2beta1.yaml
python:
    keep:
        - packages/google-cloud-asset/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-asset/
    metadata:
        name_pretty: Cloud Asset Inventory
        description: provides inventory services based on a time series database. This database keeps a five week history of Google Cloud asset metadata. The Cloud Asset Inventory export service allows you to export all asset metadata at a certain timestamp or export event change history during a timeframe.
        distribution_name: google-cloud-asset
        api_id: cloudasset.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/resource-manager/docs/cloud-asset-inventory/overview
        client_documentation: https://cloud.google.com/python/docs/reference/cloudasset/latest
        issue_tracker: https://issuetracker.google.com/savedsearches/559757
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
