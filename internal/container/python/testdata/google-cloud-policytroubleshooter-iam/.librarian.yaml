name: google-cloud-policytroubleshooter-iam
version: 0.2.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/policytroubleshooter/iam/v3
          service_config: policytroubleshooter_v3.yaml
python:
    keep:
        - packages/google-cloud-policytroubleshooter-iam/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-policytroubleshooter-iam/
    py_gapic_library:
        google/cloud/policytroubleshooter/iam/v3:
            grpc_service_config: policytroubleshooter_v3_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.cloud
                - policytroubleshooter_iam
    metadata:
        name_pretty: Policy Troubleshooter API
        distribution_name: google-cloud-policytroubleshooter-iam
        api_id: policytroubleshooter.googleapis.com
        default_version: v3
        product_documentation: https://cloud.google.com/policy-intelligence/docs/troubleshoot-access
        client_documentation: https://cloud.google.com/python/docs/reference/policytroubleshooter-iam/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=690790&template=1814512
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
