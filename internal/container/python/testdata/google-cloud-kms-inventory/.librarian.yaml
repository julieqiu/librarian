name: google-cloud-kms-inventory
version: 0.3.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/kms/inventory/v1
          service_config: kmsinventory_v1.yaml
python:
    keep:
        - packages/google-cloud-kms-inventory/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-kms-inventory/
    py_gapic_library:
        google/cloud/kms/inventory/v1:
            grpc_service_config: kmsinventory_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.cloud
                - kms_inventory
                - google.cloud.kms.v1
    metadata:
        name_pretty: KMS Inventory API
        description: KMS Inventory API
        distribution_name: google-cloud-kms-inventory
        api_id: inventory.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/kms/docs/
        client_documentation: https://cloud.google.com/python/docs/reference/inventory/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=190860&template=819701
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
