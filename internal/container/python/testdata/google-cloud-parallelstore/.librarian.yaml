name: google-cloud-parallelstore
version: 0.3.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/parallelstore/v1
          service_config: parallelstore_v1.yaml
        - path: google/cloud/parallelstore/v1beta
          service_config: parallelstore_v1beta.yaml
python:
    keep:
        - packages/google-cloud-parallelstore/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-parallelstore/
    py_gapic_library:
        google/cloud/parallelstore/v1:
            grpc_service_config: parallelstore_v1_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/parallelstore/v1beta:
            grpc_service_config: parallelstore_v1beta_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Parallelstore API
        description: Parallelstore is based on Intel DAOS and delivers up to 6.3x greater read throughput performance compared to competitive Lustre scratch offerings.
        distribution_name: google-cloud-parallelstore
        api_id: parallelstore.googleapis.com
        default_version: v1beta
        product_documentation: https://cloud.google.com/parallelstore
        client_documentation: https://cloud.google.com/python/docs/reference/google-cloud-parallelstore/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: preview
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
