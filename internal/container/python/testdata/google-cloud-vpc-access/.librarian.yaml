name: google-cloud-vpc-access
version: 1.14.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/vpcaccess/v1
          service_config: vpcaccess_v1.yaml
python:
    keep:
        - packages/google-cloud-vpc-access/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-vpc-access/
    metadata:
        name_pretty: Virtual Private Cloud
        description: provides networking functionality to Compute Engine virtual machine (VM) instances, Google Kubernetes Engine (GKE) containers, and the App Engine flexible environment. VPC provides networking for your cloud-based services that is global, scalable, and flexible.
        distribution_name: google-cloud-vpc-access
        api_id: vpcaccess.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/vpc/
        client_documentation: https://cloud.google.com/python/docs/reference/vpcaccess/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
