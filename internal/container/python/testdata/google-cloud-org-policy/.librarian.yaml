name: google-cloud-org-policy
version: 1.15.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/orgpolicy/v1
        - path: google/cloud/orgpolicy/v2
          service_config: orgpolicy_v2.yaml
python:
    keep:
        - packages/google-cloud-org-policy/pytest.ini
        - packages/google-cloud-org-policy/CHANGELOG.md
        - google/cloud/orgpolicy/v1/__init__.py
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
        - tests/unit/test_packaging.py
    remove:
        - packages/google-cloud-org-policy
    py_gapic_library:
        google/cloud/orgpolicy/v2:
            grpc_service_config: orgpolicy_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - warehouse-package-name=google-cloud-org-policy
    metadata:
        name_pretty: Organization Policy
        description: The Organization Policy API allows users to configure governance rules on their GCP resources across the Cloud Resource Hierarchy.
        distribution_name: google-cloud-org-policy
        api_id: orgpolicy.googleapis.com
        default_version: v2
        product_documentation: https://cloud.google.com/resource-manager/docs/organization-policy/overview
        client_documentation: https://cloud.google.com/python/docs/reference/orgpolicy/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
