name: google-shopping-merchant-notifications
version: 1.1.0
generate:
    specification_format: protobuf
    apis:
        - path: google/shopping/merchant/notifications/v1
          service_config: merchantapi_v1.yaml
        - path: google/shopping/merchant/notifications/v1beta
          service_config: merchantapi_v1beta.yaml
python:
    keep:
        - packages/google-shopping-merchant-notifications/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-shopping-merchant-notifications/
    py_gapic_library:
        google/shopping/merchant/notifications/v1:
            grpc_service_config: notifications_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.shopping
                - merchant_notifications
        google/shopping/merchant/notifications/v1beta:
            grpc_service_config: notifications_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - 'google.shopping.type", # Added manually'
                - google.shopping
                - merchant_notifications
    metadata:
        name_pretty: Merchant API
        description: Programmatically manage your Merchant Center accounts.
        distribution_name: google-shopping-merchant-notifications
        api_id: merchantapi.googleapis.com
        default_version: v1
        product_documentation: https://developers.google.com/merchant/api
        client_documentation: https://googleapis.dev/python/google-shopping-merchant-notifications/latest
        issue_tracker: https://github.com/googleapis/google-cloud-python/issues
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
