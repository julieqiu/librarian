name: google-cloud-recommender
version: 2.19.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/recommender/v1beta1
          service_config: recommender_v1beta1.yaml
        - path: google/cloud/recommender/v1
          service_config: recommender_v1.yaml
python:
    keep:
        - packages/google-cloud-recommender/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-recommender/
    py_gapic_library:
        google/cloud/recommender/v1:
            grpc_service_config: recommender_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
        google/cloud/recommender/v1beta1:
            grpc_service_config: recommender_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
    metadata:
        name_pretty: Cloud Recommender
        description: delivers highly personalized product recommendations at scale.
        distribution_name: google-cloud-recommender
        api_id: recommender.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/recommender
        client_documentation: https://cloud.google.com/python/docs/reference/recommender/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
