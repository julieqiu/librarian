name: google-shopping-merchant-ordertracking
version: 1.1.0
generate:
    specification_format: protobuf
    apis:
        - path: google/shopping/merchant/ordertracking/v1
          service_config: merchantapi_v1.yaml
        - path: google/shopping/merchant/ordertracking/v1beta
          service_config: merchantapi_v1beta.yaml
python:
    keep:
        - packages/google-shopping-merchant-ordertracking/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-shopping-merchant-ordertracking/
    py_gapic_library:
        google/shopping/merchant/ordertracking/v1:
            grpc_service_config: ordertracking_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - google.shopping.type
                - merchant_ordertracking
                - google.shopping
        google/shopping/merchant/ordertracking/v1beta:
            grpc_service_config: ordertracking_grpc_service_config.json
            rest_numeric_enums: true
            transport: grpc+rest
            opt_args:
                - 'google.shopping.type",  # Added manually'
                - google.shopping
                - merchant_ordertracking
    metadata:
        name_pretty: Merchant API
        description: 'Programmatically manage your Merchant Center Accounts. '
        distribution_name: google-shopping-merchant-ordertracking
        api_id: ordertracking.googleapis.com
        default_version: v1
        product_documentation: https://developers.google.com/merchant/api
        client_documentation: https://googleapis.dev/python/google-shopping-merchant-ordertracking/latest
        issue_tracker: https://issuetracker.google.com/issues/new?component=171084&template=555201
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
