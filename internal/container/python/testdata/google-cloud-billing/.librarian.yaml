name: google-cloud-billing
version: 1.17.0
generate:
    specification_format: protobuf
    apis:
        - path: google/cloud/billing/v1
          service_config: cloudbilling_v1.yaml
python:
    keep:
        - packages/google-cloud-billing/CHANGELOG.md
        - docs/CHANGELOG.md
        - docs/README.rst
        - samples/README.txt
        - scripts/client-post-processing
        - samples/snippets/README.rst
        - tests/system
    remove:
        - packages/google-cloud-billing/
    metadata:
        name_pretty: Cloud Billing
        description: allows developers to manage their billing accounts or browse the catalog of SKUs and pricing.
        distribution_name: google-cloud-billing
        api_id: cloudbilling.googleapis.com
        default_version: v1
        product_documentation: https://cloud.google.com/billing
        client_documentation: https://cloud.google.com/python/docs/reference/cloudbilling/latest
        release_level: stable
        library_type: GAPIC_AUTO
        repo: googleapis/google-cloud-python
