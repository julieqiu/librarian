name: Setup Librarian
description: Set up Go with build caching, install protoc and Go tools.
runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: "go.mod"
        cache: false
    - uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: setup-librarian-${{ runner.os }}-${{ hashFiles('go.sum', '.github/actions/setup-librarian/action.yaml') }}
        restore-keys: setup-librarian-${{ runner.os }}-
    - uses: ./.github/actions/install-protoc
    - name: Install Go tools
      run: |
        go install tool
        go install ./cmd/librarian
      shell: bash
