name: Create Issue on Failure
on:
  workflow_call:
    inputs:
      language:
        description: "The language name for the issue (e.g., Golang, Rust)."
        required: true
        type: string
      repository:
        description: "The target repository name (e.g., google-cloud-rust)."
        required: true
        type: string
permissions:
  contents: read
  issues: write
jobs:
  create-issue-on-failure:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/create-issue-on-failure
        with:
          title: "${{ inputs.repository }}: librarian generate fails when run at HEAD"
          body: |-
            The ${{ inputs.language }} CI failed on the `main` branch.

            Running `librarian generate --all` on the [${{ inputs.repository }}](https://github.com/googleapis/${{ inputs.repository }}) repository using `librarian` at HEAD failed.

            Note: This integration test only runs as a postsubmit test due to its long execution time.

            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
