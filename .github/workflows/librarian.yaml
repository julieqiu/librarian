name: Librarian
on: [push, pull_request, merge_group]
permissions:
  contents: read
  issues: write
jobs:
  go-generate:
    runs-on: ubuntu-24.04
    # Presubmit jobs must complete within 5 minutes. See CONTRIBUTING.md.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: ./.github/actions/install-protoc
      - name: Install Go tools
        run: go install tool
      - name: Check go generate
        run: |
          go generate ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "go generate produced diffs:"
            git diff
            exit 1
          fi
  legacylibrarian:
    runs-on: ubuntu-24.04
    # Presubmit jobs must complete within 5 minutes. See CONTRIBUTING.md.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Run tests
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./internal/legacylibrarian/...
      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  test:
    runs-on: ubuntu-24.04
    # Presubmit jobs must complete within 5 minutes. See CONTRIBUTING.md.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: ./.github/actions/install-protoc
      - name: Install Go tools
        run: go install tool
      - name: Run tests
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic \
            $(go list ./... | grep -v -E 'internal/librarian/(dart|java|nodejs|python|rust)|internal/sidekick|internal/legacylibrarian')
      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  create-issue-on-failure:
    runs-on: ubuntu-24.04
    needs: [go-generate, legacylibrarian, test]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/create-issue-on-failure
        with:
          title: "all: tests failed at HEAD"
          body: "Tests failed at HEAD of the `main` branch. Please review Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} for detail."
