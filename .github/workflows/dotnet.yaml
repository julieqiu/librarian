name: .NET
on: [push, pull_request, merge_group]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04
    # Presubmit jobs must complete within 5 minutes. See CONTRIBUTING.md.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Display Go version
        run: go version
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Remove preinstalled .NET SDK
        run: |
          rm -rf /usr/share/dotnet/sdk/10.* || true
          dotnet --list-sdks
      - uses: ./.github/actions/install-protoc
      - name: Install grpc_csharp_plugin
        run: |
          set -e
          tmpdir=$(mktemp -d)
          curl -fsSL --retry 5 --retry-delay 15 -o "$tmpdir/grpc.tools.nupkg" \
            "https://www.nuget.org/api/v2/package/Grpc.Tools/$VERSION"
          sha256sum -c <(echo "$CHECKSUM $tmpdir/grpc.tools.nupkg")
          unzip -o "$tmpdir/grpc.tools.nupkg" -d "$tmpdir/grpc-tools"
          sudo cp "$tmpdir/grpc-tools/tools/linux_x64/grpc_csharp_plugin" /usr/local/bin/
          sudo chmod +x /usr/local/bin/grpc_csharp_plugin
          grpc_csharp_plugin --version || true
          rm -rf "$tmpdir"
        env:
          VERSION: 2.60.0
          CHECKSUM: 30827f65555e03e285f5193125db8cea001f349841a7e304d97235fd79796239
      - name: Install Google.Api.Generator
        run: |
          set -e
          GAPIC_VERSION=v1.4.36
          GAPIC_CHECKSUM=fe43b11e145d77e0265cf57e5dd4c5c7e8f1a525
          git clone -q https://github.com/googleapis/gapic-generator-csharp /tmp/gapic-generator-csharp
          git -C /tmp/gapic-generator-csharp checkout -q "$GAPIC_VERSION"
          actual=$(git -C /tmp/gapic-generator-csharp rev-parse HEAD)
          if [ "$actual" != "$GAPIC_CHECKSUM" ]; then
            echo "Checksum mismatch: expected $GAPIC_CHECKSUM, got $actual"
            exit 1
          fi
          echo '{"sdk":{"version":"8.0.0","rollForward":"latestMinor","allowPrerelease":false}}' \
            > /tmp/gapic-generator-csharp/global.json
          dotnet publish -v quiet -nologo -clp:NoSummary -c Release \
            --self-contained --runtime=linux-x64 \
            /tmp/gapic-generator-csharp/Google.Api.Generator
          sudo ln -s /tmp/gapic-generator-csharp/Google.Api.Generator/bin/Release/net8.0/linux-x64/publish/Google.Api.Generator \
            /usr/local/bin/Google.Api.Generator
      - name: Run internal/librarian/dotnet tests
        run: go test -race ./internal/librarian/dotnet
